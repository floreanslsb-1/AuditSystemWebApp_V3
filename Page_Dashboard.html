<script>
// ============================================================
//  Page_Dashboard.html — v3 (redesign total)
//  Sections:
//    1. Audit Progress Overview (donut + per-area modal)
//    2. Approval Progress Table (per area × per finding_status)
//
//  Data dari _getDashboardData():
//    { agendas, findings, summary, period }
//  summary keys:
//    total, pending_verification,
//    open, tpp_or_dept_head, tpp_or_auditor, tpp_or_koordinator,
//    open_impl, app_dept_head, app_auditor, app_koordinator,
//    closed, overdue,
//    agenda_planned, agenda_started, agenda_done
// ============================================================

Pages['dashboard'] = async function(container) {
  container.innerHTML =
    '<div class="page-loader"><div class="spinner dark"></div><span>Memuat dashboard...</span></div>';
  try {
    // Load daftar periode untuk selector (COMPLETED + ACTIVE)
    var allPeriods = await cachedApi('GET_PERIODS', {}, 60);
    var viewable   = (allPeriods || []).filter(function(p) {
      return p.status === 'ACTIVE' || p.status === 'COMPLETED';
    }).sort(function(a, b) {
      // ACTIVE di atas, COMPLETED urut terbaru dulu
      if (a.status === 'ACTIVE') return -1;
      if (b.status === 'ACTIVE') return 1;
      return (b.completed_at || b.tanggal_selesai || '') > (a.completed_at || a.tanggal_selesai || '') ? 1 : -1;
    });

    // Default: periode aktif, atau periode pertama kalau tidak ada yang aktif
    var defaultId = App.activePeriod
      ? App.activePeriod.period_id
      : (viewable[0] ? viewable[0].period_id : null);

    // Gunakan period yang tersimpan di state kalau ada (supaya tidak reset saat re-render)
    var selectedId = (App.dashboardSelectedPeriodId && viewable.find(function(p) {
      return p.period_id === App.dashboardSelectedPeriodId;
    })) ? App.dashboardSelectedPeriodId : defaultId;

    App.dashboardSelectedPeriodId = selectedId;
    App._dashboardPeriods = viewable;

    var raw  = await cachedApi('GET_DASHBOARD', { period_id: selectedId }, 20);
    var data = typeof raw === 'string' ? JSON.parse(raw) : raw;
    App.dashboardData = data;
    _renderDashboard(container, data, viewable, selectedId);
  } catch(err) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<i data-lucide="alert-triangle" style="width:48px;height:48px;opacity:.3;margin-bottom:16px"></i>' +
        '<div class="empty-title">Gagal Memuat Dashboard</div>' +
        '<div class="empty-desc">' + escHtml(err.message) + '</div>' +
      '</div>';
    lucide.createIcons();
  }
};

async function _dashboardSwitchPeriod(periodId) {
  App.dashboardSelectedPeriodId = periodId;
  var container = document.getElementById('page-content');
  if (!container) return;

  // Ganti selector UI saja dulu (loading state di section data)
  var dataSection = document.getElementById('dashboard-data-section');
  if (dataSection) {
    dataSection.innerHTML =
      '<div class="page-loader" style="padding:60px 0"><div class="spinner dark"></div>' +
      '<span>Memuat data periode...</span></div>';
  }

  try {
    // Cache key berbeda per period_id agar tidak tumpang tindih
    var raw  = await cachedApi('GET_DASHBOARD', { period_id: periodId }, 20);
    var data = typeof raw === 'string' ? JSON.parse(raw) : raw;
    App.dashboardData = data;
    var viewable   = App._dashboardPeriods || [];
    _renderDashboardData(dataSection, data, viewable, periodId);
    lucide.createIcons();
  } catch(err) {
    if (dataSection) dataSection.innerHTML =
      '<div class="empty-state"><div class="empty-desc">' + escHtml(err.message) + '</div></div>';
  }
}

// ════════════════════════════════════════════════════════════
//  MAIN RENDER
// ════════════════════════════════════════════════════════════

function _renderDashboard(container, data, viewablePeriods, selectedPeriodId) {
  viewablePeriods = viewablePeriods || [];
  selectedPeriodId = selectedPeriodId || null;

  // ── Period selector HTML ──────────────────────────────────
  var selectorHtml = '';
  if (viewablePeriods.length >= 1) {
    selectorHtml =
      '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px">' +
        '<span style="font-size:12px;font-weight:600;color:var(--text-muted);flex-shrink:0">Lihat periode:</span>' +
        '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
          viewablePeriods.map(function(p) {
            var isSelected = p.period_id === selectedPeriodId;
            var isActive   = p.status === 'ACTIVE';
            return '<button onclick="singleClick(this,function(){ _dashboardSwitchPeriod(\'' + escAttr(p.period_id) + '\') })" ' +
              'style="padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;' +
                'border:1.5px solid ' + (isSelected ? 'var(--blue,#3b82f6)' : 'var(--border)') + ';' +
                'background:' + (isSelected ? 'rgba(59,130,246,.1)' : 'transparent') + ';' +
                'color:' + (isSelected ? 'var(--blue,#3b82f6)' : 'var(--text-muted)') + ';' +
                'display:inline-flex;align-items:center;gap:5px">' +
              (isActive
                ? '<span style="width:6px;height:6px;border-radius:50%;background:var(--emerald,#10b981);flex-shrink:0"></span>'
                : '') +
              escHtml(p.nama_periode) +
            '</button>';
          }).join('') +
        '</div>' +
      '</div>';
  }

  // ── No period ─────────────────────────────────────────────
  if (!data.period && viewablePeriods.length === 0) {
    container.innerHTML =
      '<div class="empty-state" style="padding:80px 40px">' +
        '<i data-lucide="calendar-off" style="width:48px;height:48px;opacity:.25;margin-bottom:16px"></i>' +
        '<div class="empty-title">Tidak Ada Periode Aktif</div>' +
        '<div class="empty-desc">Hubungi Koordinator untuk mengaktifkan periode audit.</div>' +
        (App.profile && App.profile.isKoordinator
          ? '<button class="btn btn-primary" style="margin-top:20px" onclick="navigateTo(\'admin\')">' +
              '<i data-lucide="settings" style="width:14px;height:14px"></i> Kelola Periode' +
            '</button>'
          : '') +
      '</div>';
    lucide.createIcons();
    return;
  }

  // Render selector + wrapper untuk data section
  container.innerHTML = selectorHtml + '<div id="dashboard-data-section"></div>';
  var dataSection = document.getElementById('dashboard-data-section');
  _renderDashboardData(dataSection, data, viewablePeriods, selectedPeriodId);
  lucide.createIcons();
}

function _renderDashboardData(container, data, viewablePeriods, selectedPeriodId) {
  var agendas  = data.agendas  || [];
  var findings = data.findings || [];
  var s        = data.summary  || {};
  var period   = data.period   || null;

  if (!period) {
    container.innerHTML =
      '<div class="empty-state" style="padding:60px 0">' +
        '<div class="empty-title" style="font-size:14px">Tidak ada data untuk periode ini.</div>' +
      '</div>';
    return;
  }

  var totalAgendas = agendas.length;
  var donePct      = totalAgendas ? Math.round(((s.agenda_done || 0) / totalAgendas) * 100) : 0;

  container.innerHTML =
    _dbStyles() +

    // ── Page header ─────────────────────────────────────────
    '<div class="page-hero mb-24">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">' +
        '<div>' +
          '<h1 style="margin:0 0 4px">Dashboard</h1>' +
          '<div style="font-size:13px;color:var(--text-muted)">' +
            escHtml(period.nama_periode) +
            (period.tanggal_mulai
              ? ' · ' + formatDate(period.tanggal_mulai) +
                (period.tanggal_selesai ? ' — ' + formatDate(period.tanggal_selesai) : '')
              : '') +
          '</div>' +
        '</div>' +
        statusBadge(period.status) +
      '</div>' +
    '</div>' +

    // ── Section 1: Audit Progress + OFI Summary (side by side) ──
    '<div class="db-top-row">' +
      _dbProgressSection(agendas, s, donePct, totalAgendas) +
      _dbOfiSection(agendas) +
    '</div>' +

    // ── Section 2: Approval Table ────────────────────────────
    _dbApprovalSection(agendas, findings, s);

  lucide.createIcons();
}

// ════════════════════════════════════════════════════════════
//  STYLES (scoped via .db- prefix)
// ════════════════════════════════════════════════════════════

function _dbStyles() {
  return '<style>' +
    /* Progress section */
    '.db-progress-grid{display:grid;grid-template-columns:auto 1fr auto;gap:28px;align-items:center}' +
    '@media(max-width:640px){.db-progress-grid{grid-template-columns:1fr;gap:16px}}' +
    '.db-sep{width:1px;height:72px;background:var(--surface)}' +
    '@media(max-width:640px){.db-sep{display:none}}' +

    /* Approval table */
    '.db-tbl{width:100%;border-collapse:separate;border-spacing:0;min-width:800px}' +
    '.db-tbl th{' +
      'padding:9px 10px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;' +
      'color:var(--text-muted);background:var(--surface2);text-align:center;white-space:nowrap;' +
      'border-bottom:1px solid var(--border);border-right:1px solid var(--border)' +
    '}' +
    '.db-tbl td{' +
      'padding:11px 10px;font-size:13px;border-bottom:1px solid var(--border);' +
      'border-right:1px solid var(--border);text-align:center;vertical-align:middle' +
    '}' +
    '.db-tbl tr:last-child td{border-bottom:none}' +
    '.db-tbl td:last-child,.db-tbl th:last-child{border-right:none}' +
    '<th rowspan="2" class="db-col-area" style="vertical-align:middle;text-align:center!important;z-index:2;border-bottom:1px solid var(--border)">Area</th>' +
    '.db-total-row td{background:var(--surface2)!important;font-weight:700;border-top:none!important;border-bottom:none!important}' +
    '.db-total-row .db-col-area{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted)}' +

    /* Cell values */
    '.db-zero{color:var(--border);font-size:11px}' +
    '.db-pos{font-weight:700;color:var(--text)}' +

    /* Column group bg tints */
    '.db-g-open{background:rgba(244,63,94,.04)}' +
    '.db-g-tpp{background:rgba(245,158,11,.04)}' +
    '.db-g-impl-open{background:rgba(59,130,246,.05)}' +
    '.db-g-impl{background:rgba(139,92,246,.04)}' +
    '.db-g-closed{background:rgba(16,185,129,.05)}' +
    '.db-g-overdue{background:rgba(244,63,94,.08)}' +

    /* Group header tints */
    '.db-gh-open{background:rgba(244,63,94,.06)!important}' +
    '.db-gh-tpp{background:rgba(245,158,11,.06)!important}' +
    '.db-gh-impl-open{background:rgba(59,130,246,.07)!important}' +
    '.db-gh-impl{background:rgba(139,92,246,.06)!important}' +
    '.db-gh-closed{background:rgba(16,185,129,.07)!important}' +
    '.db-gh-overdue{background:rgba(244,63,94,.12)!important}' +

    /* Hover row */
    '.db-tbl tbody tr:hover td{background:var(--surface2);transition:background .1s}' +
    '.db-tbl tbody tr:hover .db-col-area{background:var(--surface2)}' +

    /* Top row layout — Progress + OFI side by side */
    '.db-top-row{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start;margin-bottom:24px}' +
    '@media(max-width:900px){.db-top-row{grid-template-columns:1fr;}}' +

    /* OFI table */
    '.db-ofi-tbl{width:100%;border-collapse:collapse}' +
    '.db-ofi-tbl th{' +
      'padding:8px 12px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;' +
      'color:var(--text-muted);background:var(--surface2);text-align:left;' +
      'border-bottom:1px solid var(--border)' +
    '}' +
    '.db-ofi-tbl td{' +
      'padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);' +
      'vertical-align:top;line-height:1.5' +
    '}' +
    '.db-ofi-tbl tbody tr:last-child td{border-bottom:none}' +
    '.db-ofi-tbl .db-ofi-no{width:36px;text-align:center;color:var(--text-muted);font-size:12px;font-weight:600}' +
    '.db-ofi-tbl .db-ofi-dept{width:140px;white-space:nowrap}' +
    '.db-ofi-empty{text-align:center;padding:40px!important;color:var(--text-muted);font-size:13px}' +
    '.db-ofi-search{' +
      'width:100%;box-sizing:border-box;' +
      'padding:7px 12px 7px 32px;' +
      'font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);' +
      'background:var(--bg);color:var(--text);outline:none;' +
      'transition:border-color .15s' +
    '}' +
    '.db-ofi-search:focus{border-color:var(--blue)}' +
    '.db-ofi-search-wrap{position:relative}' +
    '.db-ofi-search-icon{' +
      'position:absolute;left:9px;top:50%;transform:translateY(-50%);' +
      'width:14px;height:14px;color:var(--text-muted);pointer-events:none' +
    '}' +

  '</style>';
}

// ════════════════════════════════════════════════════════════
//  SECTION 1 — AUDIT PROGRESS OVERVIEW
// ════════════════════════════════════════════════════════════

function _dbProgressSection(agendas, s, donePct, totalAgendas) {
  if (!totalAgendas) {
    return '<div class="card mb-24"><div class="card-body" style="text-align:center;padding:40px">' +
      '<i data-lucide="clipboard-x" style="width:36px;height:36px;opacity:.25;margin-bottom:12px"></i>' +
      '<div style="font-size:14px;color:var(--text-muted)">Belum ada agenda di periode ini.</div>' +
      '</div></div>';
  }

  var pendingVerif = s.pending_verification || 0;
  var hasOverdue   = (s.overdue || 0) > 0;

  return '<div class="card" style="max-width:560px">' +
    '<div class="card-header">' +
      '<div>' +
        '<div class="card-title">Progres Audit</div>' +
        '<div class="card-subtitle">Status penyelesaian form audit per area</div>' +
      '</div>' +
      '<button class="btn btn-outline btn-sm" onclick="_dbOpenProgressModal()">' +
        '<i data-lucide="list" style="width:13px;height:13px"></i> Detail Per Area' +
      '</button>' +
    '</div>' +
    '<div class="card-body">' +

      '<div class="db-progress-grid">' +

        // Donut chart
        '<div style="position:relative;cursor:pointer;flex-shrink:0;width:120px;height:120px;margin:0 auto" onclick="_dbOpenProgressModal()" title="Klik untuk detail area">' +
          _dbDonut(donePct, 120, s.agenda_done || 0, s.agenda_started || 0, totalAgendas) +
          '<div style="position:absolute;top:0;left:0;width:120px;height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none">' +
            '<div style="font-size:26px;font-weight:800;color:var(--text);line-height:1">' + donePct + '%</div>' +
            '<div style="font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-top:3px">Selesai</div>' +
          '</div>' +
        '</div>' +

        // Legend
        '<div>' +
          _dbProgressLegend('var(--emerald)', 'Selesai', s.agenda_done || 0, totalAgendas) +
          _dbProgressLegend('var(--blue)',    'Sedang Berjalan', s.agenda_started || 0, totalAgendas) +
          _dbProgressLegend('var(--border)',  'Belum Dimulai', s.agenda_planned || 0, totalAgendas) +
        '</div>' +

        '<div class="db-sep"></div>' +

        // Findings summary
        '<div style="min-width:160px;padding-left:16px">' +
          '<div style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px">Temuan</div>' +
          '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:10px">' +
            '<span style="font-size:36px;font-weight:800;color:var(--text);line-height:1;font-family:\'DM Mono\',monospace">' + (s.total || 0) + '</span>' +
            '<span style="font-size:13px;color:var(--text-muted)">Non Comply</span>' +
          '</div>' +
          (pendingVerif > 0
            ? '<div style="display:inline-flex;align-items:center;gap:5px;' +
                'background:rgba(245,158,11,.1);border:1px solid var(--amber,#f59e0b);' +
                'border-radius:6px;padding:5px 9px;font-size:11px;font-weight:600;color:var(--amber,#f59e0b);margin-bottom:4px">' +
                '<i data-lucide="clock" style="width:11px;height:11px"></i>' +
                pendingVerif + ' menunggu verifikasi' +
              '</div><br>'
            : '') +
          (hasOverdue
            ? '<div style="display:inline-flex;align-items:center;gap:5px;' +
                'background:rgba(244,63,94,.1);border:1px solid var(--rose,#f43f5e);' +
                'border-radius:6px;padding:5px 9px;font-size:11px;font-weight:600;color:var(--rose,#f43f5e)">' +
                '<i data-lucide="alert-triangle" style="width:11px;height:11px"></i>' +
                (s.overdue) + ' overdue' +
              '</div>'
            : '') +
        '</div>' +

      '</div>' +

    '</div>' +
  '</div>';
}

// ════════════════════════════════════════════════════════════
//  SECTION 1b — OFI SUMMARY
// ════════════════════════════════════════════════════════════

function _dbOfiSection(agendas) {
  // Ambil hanya agenda DONE yang punya OFI
  var ofiRows = agendas
    .filter(function(a) { return a.status === 'DONE' && a.ofi && a.ofi.trim() && a.ofi.trim() !== '-'; })
    .map(function(a, i) {
      return {
        no:   i + 1,
        dept: a.dept || a.area_id,
        ofi:  a.ofi.trim(),
      };
    });

  // Selalu tampilkan card, walau kosong
  var tableId  = 'db-ofi-table-body';
  var searchId = 'db-ofi-search';

  var tableRows = ofiRows.length
    ? ofiRows.map(function(r) {
        return '<tr data-dept="' + escAttr(r.dept.toLowerCase()) + '" data-ofi="' + escAttr(r.ofi.toLowerCase()) + '">' +
          '<td class="db-ofi-no">' + r.no + '</td>' +
          '<td class="db-ofi-dept"><strong>' + escHtml(r.dept) + '</strong></td>' +
          '<td>' + escHtml(r.ofi) + '</td>' +
        '</tr>';
      }).join('')
    : '<tr id="db-ofi-empty-row"><td colspan="3" class="db-ofi-empty">' +
        '<i data-lucide="smile" style="width:28px;height:28px;opacity:.25;display:block;margin:0 auto 8px"></i>' +
        'Belum ada OFI yang tercatat.' +
      '</td></tr>';

  return '<div class="card" style="flex:1;min-width:0;display:flex;flex-direction:column">' +
    '<div class="card-header" style="flex-wrap:wrap;gap:10px">' +
      '<div>' +
        '<div class="card-title">OFI Summary</div>' +
        '<div class="card-subtitle">Opportunity for Improvement per area</div>' +
      '</div>' +
      // Search bar
      '<div class="db-ofi-search-wrap" style="flex:0 0 auto;width:180px">' +
        '<svg class="db-ofi-search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>' +
        '</svg>' +
        '<input type="text" id="' + searchId + '" class="db-ofi-search" placeholder="Cari dept atau OFI..." ' +
          'oninput="_dbOfiFilter(this.value)">' +
      '</div>' +
    '</div>' +
    '<div class="card-body" style="padding:0;overflow-y:auto;max-height:260px">' +
      '<table class="db-ofi-tbl">' +
        '<thead><tr>' +
          '<th class="db-ofi-no">#</th>' +
          '<th>Dept / Bagian</th>' +
          '<th>Opportunity for Improvement (OFI)</th>' +
        '</tr></thead>' +
        '<tbody id="' + tableId + '">' +
          tableRows +
        '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

function _dbOfiFilter(query) {
  var q    = (query || '').toLowerCase().trim();
  var body = document.getElementById('db-ofi-table-body');
  if (!body) return;
  var rows     = body.querySelectorAll('tr[data-dept]');
  var emptyRow = document.getElementById('db-ofi-empty-row');
  var visible  = 0;

  rows.forEach(function(row) {
    var dept = row.getAttribute('data-dept') || '';
    var ofi  = row.getAttribute('data-ofi')  || '';
    var match = !q || dept.includes(q) || ofi.includes(q);
    row.style.display = match ? '' : 'none';
    if (match) visible++;
  });

  // Tampilkan baris "tidak ditemukan" kalau semua tersembunyi
  if (emptyRow) {
    emptyRow.style.display = 'none';
  } else {
    var noResult = document.getElementById('db-ofi-no-result');
    if (!noResult) {
      noResult = document.createElement('tr');
      noResult.id = 'db-ofi-no-result';
      noResult.innerHTML = '<td colspan="3" class="db-ofi-empty">Tidak ada hasil untuk "<strong>' + escHtml(query) + '</strong>".</td>';
      body.appendChild(noResult);
    }
    noResult.style.display = (visible === 0 && q) ? '' : 'none';
  }

  // Nomor urut ulang sesuai yang visible
  var counter = 1;
  rows.forEach(function(row) {
    if (row.style.display !== 'none') {
      var noCell = row.querySelector('.db-ofi-no');
      if (noCell) noCell.textContent = counter++;
    }
  });
}

function _dbProgressLegend(color, label, count, total) {
  return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">' +
    '<div style="width:10px;height:10px;border-radius:50%;background:' + color + ';flex-shrink:0"></div>' +
    '<div style="flex:1;font-size:13px;color:var(--text-muted)">' + label + '</div>' +
    '<div style="font-size:13px;font-weight:700;color:var(--text)">' + count + ' <span style="font-weight:400;color:var(--text-muted)">area</span></div>' +
  '</div>';
}

function _dbDonut(donePct, size, done, started, total) {
  var sw    = 9;
  var r     = (size / 2) - sw;
  var circ  = 2 * Math.PI * r;
  var cx    = size / 2, cy = size / 2;

  // Done arc (emerald)
  var doneFill    = circ - (donePct / 100) * circ;
  // Started arc (blue) starts where done ends
  var startedPct  = total > 0 ? (started / total) * 100 : 0;
  var startedDash = (startedPct / 100) * circ;
  var startedGap  = circ - startedDash;
  var startedRot  = -90 + (donePct / 100) * 360;

  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
    // Track
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--surface2)" stroke-width="' + sw + '"/>' +
    // Started arc
    (started > 0
      ? '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--blue)" stroke-width="' + sw + '" ' +
          'stroke-dasharray="' + startedDash + ' ' + startedGap + '" ' +
          'transform="rotate(' + startedRot + ' ' + cx + ' ' + cy + ')" ' +
          'style="transition:stroke-dasharray .6s ease"/>'
      : '') +
    // Done arc
    (done > 0
      ? '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--emerald)" stroke-width="' + sw + '" ' +
          'stroke-dasharray="' + ((donePct / 100) * circ) + ' ' + (circ - (donePct / 100) * circ) + '" ' +
          'stroke-linecap="round" transform="rotate(-90 ' + cx + ' ' + cy + ')" ' +
          'style="transition:stroke-dasharray .6s ease"/>'
      : '') +
  '</svg>';
}

function _dbOpenProgressModal() {
  var data = App.dashboardData;
  if (!data || !data.agendas || !data.agendas.length) return;

  var sorted = data.agendas.slice().sort(function(a, b) {
    var o = { STARTED: 0, PLANNED: 1, DONE: 2 };
    return (o[a.status] || 1) - (o[b.status] || 1);
  });

  var doneCount    = sorted.filter(function(a) { return a.status === 'DONE';    }).length;
  var startedCount = sorted.filter(function(a) { return a.status === 'STARTED'; }).length;
  var plannedCount = sorted.filter(function(a) { return a.status === 'PLANNED'; }).length;

  // ── Buat baris tabel — simpan data-status untuk filter ───
  function _makeRows(agList) {
    return agList.map(function(ag) {
      var isDone    = ag.status === 'DONE';
      var isStarted = ag.status === 'STARTED';
      var icon  = isDone ? 'check-circle' : isStarted ? 'play-circle' : 'circle';
      var color = isDone ? 'var(--emerald)' : isStarted ? 'var(--blue)' : 'var(--border)';
      var dateInfo = isDone    ? (ag.agreement_at ? 'Selesai: ' + formatDate(ag.agreement_at) : 'Selesai') :
                     isStarted ? (ag.started_at   ? 'Dimulai: ' + formatDate(ag.started_at)   : 'Berjalan') :
                     'Belum dimulai';

      // Auditor list — parse CSV, tandai lead
      var auditorHtml = (ag.auditor_emails || '')
        .split(',')
        .map(function(e) { return e.trim(); })
        .filter(Boolean)
        .map(function(email) {
          var shortName = email.split('@')[0];
          var isLead    = email === (ag.lead_auditor || '').trim();
          return '<div style="font-size:12px;line-height:1.6;' +
            (isLead ? 'font-weight:700;color:var(--blue)' : 'color:var(--text-muted)') + '">' +
            escHtml(shortName) +
            (isLead ? ' <span style="font-size:10px;font-weight:600;' +
              'background:rgba(59,130,246,.1);color:var(--blue);' +
              'border-radius:4px;padding:1px 5px;vertical-align:middle">Lead</span>' : '') +
          '</div>';
        }).join('');

      return '<tr data-status="' + ag.status + '">' +
        '<td>' +
          '<div style="display:flex;align-items:center;gap:10px">' +
            '<i data-lucide="' + icon + '" style="width:15px;height:15px;color:' + color + ';flex-shrink:0"></i>' +
            '<div>' +
              '<div style="font-size:13px;font-weight:600">' + escHtml(ag.dept || ag.area_id) + '</div>' +
              (ag.kategori ? '<div style="font-size:11px;color:var(--text-muted)">' + escHtml(ag.kategori) + '</div>' : '') +
            '</div>' +
          '</div>' +
        '</td>' +
        '<td>' + (auditorHtml || '<span style="font-size:12px;color:var(--text-muted)">—</span>') + '</td>' +
        '<td>' + statusBadge(ag.status || 'PLANNED') + '</td>' +
        '<td style="font-size:12px;color:var(--text-muted)">' + dateInfo + '</td>' +
      '</tr>';
    }).join('');
  }

  // ── Filter pill helper ────────────────────────────────────
  function _pill(status, label, count, color) {
    return '<button onclick="_dbProgressFilter(\'' + status + '\',this)" ' +
      'data-filter="' + status + '" ' +
      'style="display:inline-flex;align-items:center;gap:5px;' +
        'padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;' +
        'border:1.5px solid var(--border);background:var(--surface2);color:var(--text);' +
        'transition:all .15s">' +
      '<span style="width:7px;height:7px;border-radius:50%;background:' + color + ';flex-shrink:0"></span>' +
      count + ' ' + label +
    '</button>';
  }

  createModal({
    id: 'db-progress-modal',
    title: 'Detail Progres Audit Per Area',
    size: 'modal-lg',
    body:
      // Filter pills
      '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">' +
        '<button onclick="_dbProgressFilter(\'ALL\',this)" data-filter="ALL" ' +
          'style="display:inline-flex;align-items:center;gap:5px;' +
            'padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;' +
            'border:1.5px solid var(--blue);background:var(--blue);color:#fff;transition:all .15s">' +
          'Semua (' + sorted.length + ')' +
        '</button>' +
        _pill('DONE',    'Selesai',       doneCount,    'var(--emerald)') +
        _pill('STARTED', 'Sedang Berjalan', startedCount, 'var(--blue)') +
        _pill('PLANNED', 'Belum Dimulai',  plannedCount, 'var(--border)') +
      '</div>' +

      '<div class="table-wrap">' +
        '<table id="db-progress-table">' +
          '<thead><tr>' +
            '<th>Area</th>' +
            '<th>Auditor</th>' +
            '<th>Status</th>' +
            '<th>Info</th>' +
          '</tr></thead>' +
          '<tbody id="db-progress-tbody">' + _makeRows(sorted) + '</tbody>' +
        '</table>' +
        '<div id="db-progress-empty" style="display:none;text-align:center;padding:32px;' +
          'font-size:13px;color:var(--text-muted)">Tidak ada data untuk filter ini.</div>' +
      '</div>',
    footer:
      '<button class="btn btn-outline" onclick="closeModal(\'db-progress-modal\')">Tutup</button>',
  });
  lucide.createIcons();
}

// ── Filter handler — dipanggil dari pill buttons ─────────────
function _dbProgressFilter(status, btn) {
  // Update pill styles
  document.querySelectorAll('#db-progress-modal [data-filter]').forEach(function(b) {
    var isActive = b === btn;
    b.style.background   = isActive ? 'var(--blue)' : 'var(--surface2)';
    b.style.color        = isActive ? '#fff'        : 'var(--text)';
    b.style.borderColor  = isActive ? 'var(--blue)' : 'var(--border)';
  });

  var tbody   = document.getElementById('db-progress-tbody');
  var empty   = document.getElementById('db-progress-empty');
  if (!tbody) return;

  var rows    = tbody.querySelectorAll('tr[data-status]');
  var visible = 0;
  rows.forEach(function(row) {
    var match = (status === 'ALL') || (row.getAttribute('data-status') === status);
    row.style.display = match ? '' : 'none';
    if (match) visible++;
  });

  empty.style.display  = visible === 0 ? '' : 'none';
  tbody.style.display  = visible === 0 ? 'none' : '';
}

function _dbPill(color, label) {
  return '<span style="display:inline-flex;align-items:center;gap:5px;' +
    'padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;' +
    'background:var(--surface2);border:1px solid var(--border);color:var(--text)">' +
    '<span style="width:7px;height:7px;border-radius:50%;background:' + color + ';flex-shrink:0"></span>' +
    label +
  '</span>';
}

// ════════════════════════════════════════════════════════════
//  SECTION 2 — APPROVAL PROGRESS TABLE
// ════════════════════════════════════════════════════════════

function _dbApprovalSection(agendas, findings, s) {
  var title = '<div class="card-header">' +
    '<div>' +
      '<div class="card-title">Status Tindak Lanjut Temuan</div>' +
      '<div class="card-subtitle">Progress TPP dan implementasi per area</div>' +
    '</div>' +
  '</div>';

  if (!s.total) {
    return '<div class="card">' + title +
      '<div class="card-body" style="text-align:center;padding:48px">' +
        '<i data-lucide="inbox" style="width:36px;height:36px;opacity:.25;margin-bottom:12px"></i>' +
        '<div style="font-size:14px;color:var(--text-muted)">Belum ada temuan Non Comply di periode ini.</div>' +
      '</div>' +
    '</div>';
  }

  if (!agendas.length) {
    return '<div class="card">' + title +
      '<div class="card-body"><div class="empty-state">Tidak ada data agenda.</div></div>' +
    '</div>';
  }

  var tableData   = _dbBuildTableData(agendas, findings);
  var totals      = _dbCalcTotals(tableData);
  var showOverdue = (s.overdue || 0) > 0;

  // ── Header row 1 (group labels) ──────────────────────────
  var gh = '<tr>' +
    '<th rowspan="2" class="db-col-area" style="vertical-align:middle;text-align:center!important;z-index:2;border-bottom:1px solid var(--border)">Area</th>' +
    '<th rowspan="2" class="db-gh-open" style="vertical-align:middle;color:var(--rose,#f43f5e);border-bottom:2px solid var(--rose,#f43f5e)">OPEN</th>' +
    '<th colspan="3" class="db-gh-tpp" style="color:var(--amber,#f59e0b);border-bottom:2px solid var(--amber,#f59e0b)">On Review TPP</th>' +
    '<th rowspan="2" class="db-gh-impl-open" style="vertical-align:middle;color:var(--blue,#3b82f6);border-bottom:2px solid var(--blue,#3b82f6)">Open<br>Implementasi</th>' +
    '<th colspan="3" class="db-gh-impl" style="color:var(--purple,#8b5cf6);border-bottom:2px solid var(--purple,#8b5cf6)">Approval Implementasi</th>' +
    '<th rowspan="2" class="db-gh-closed" style="vertical-align:middle;color:var(--emerald,#10b981);border-bottom:2px solid var(--emerald,#10b981)">Closed</th>' +
    (showOverdue ? '<th rowspan="2" class="db-gh-overdue" style="vertical-align:middle;color:var(--rose,#f43f5e);border-bottom:2px solid var(--rose,#f43f5e)">Overdue</th>' : '') +
    '<th rowspan="2" style="vertical-align:middle;color:var(--text);border-bottom:2px solid var(--text);background:var(--surface2)!important">Total</th>' +
  '</tr>';

  // ── Header row 2 (column labels) ─────────────────────────
  var ch = '<tr>' +
    // OPEN covered by rowspan
    '<th class="db-gh-tpp" style="color:var(--amber,#f59e0b)">Dept Head</th>' +
    '<th class="db-gh-tpp" style="color:var(--amber,#f59e0b)">Auditor</th>' +
    '<th class="db-gh-tpp" style="color:var(--amber,#f59e0b)">Koordinator</th>' +
    // Open Impl covered by rowspan
    '<th class="db-gh-impl" style="color:var(--purple,#8b5cf6)">Dept Head</th>' +
    '<th class="db-gh-impl" style="color:var(--purple,#8b5cf6)">Auditor</th>' +
    '<th class="db-gh-impl" style="color:var(--purple,#8b5cf6)">Koordinator</th>' +
    // Closed + Overdue covered by rowspan
  '</tr>';

  // ── Data rows ─────────────────────────────────────────────
  var dataRows = tableData.map(function(row, idx) {
    var hasAny = (row.n_open + row.n_tpp_dh + row.n_tpp_aud + row.n_tpp_koor +
                  row.n_open_impl + row.n_app_dh + row.n_app_aud + row.n_app_koor +
                  row.n_closed + row.n_overdue) > 0;

    return '<tr' + (!hasAny ? ' style="opacity:.5"' : '') + '>' +
      '<td class="db-col-area">' +
        '<div style="display:flex;align-items:center;gap:16px">' +
          '<span style="font-size:11px;font-weight:700;color:var(--text-muted);' +
            'min-width:18px;text-align:right;flex-shrink:0">' + (idx + 1) + '</span>' +
          '<div>' +
            '<div style="font-size:13px;font-weight:600">' + escHtml(row.dept) + '</div>' +
            (row.kategori ? '<div style="font-size:10px;color:var(--text-muted);font-weight:400">' + escHtml(row.kategori) + '</div>' : '') +
          '</div>' +
        '</div>' +
      '</td>' +
      _dbTd(row.n_open,     'db-g-open') +
      _dbTd(row.n_tpp_dh,   'db-g-tpp') +
      _dbTd(row.n_tpp_aud,  'db-g-tpp') +
      _dbTd(row.n_tpp_koor, 'db-g-tpp') +
      _dbTd(row.n_open_impl,'db-g-impl-open') +
      _dbTd(row.n_app_dh,   'db-g-impl') +
      _dbTd(row.n_app_aud,  'db-g-impl') +
      _dbTd(row.n_app_koor, 'db-g-impl') +
      _dbTd(row.n_closed,   'db-g-closed') +
      (showOverdue ? _dbTd(row.n_overdue, 'db-g-overdue') : '') +
      _dbTdTotal(row.n_open + row.n_tpp_dh + row.n_tpp_aud + row.n_tpp_koor +
                 row.n_open_impl + row.n_app_dh + row.n_app_aud + row.n_app_koor +
                 row.n_closed + row.n_overdue) +
    '</tr>';
  }).join('');

  // ── Total row ─────────────────────────────────────────────
  var totalRow = '<tr class="db-total-row">' +
    '<td class="db-col-area">' +
      '<div>Total</div>' +
      '<div style="font-size:10px;font-weight:400;color:var(--text-muted)">' + tableData.length + ' area</div>' +
    '</td>' +
    _dbTd(totals.n_open,     'db-g-open', true) +
    _dbTd(totals.n_tpp_dh,   'db-g-tpp', true) +
    _dbTd(totals.n_tpp_aud,  'db-g-tpp', true) +
    _dbTd(totals.n_tpp_koor, 'db-g-tpp', true) +
    _dbTd(totals.n_open_impl,'db-g-impl-open', true) +
    _dbTd(totals.n_app_dh,   'db-g-impl', true) +
    _dbTd(totals.n_app_aud,  'db-g-impl', true) +
    _dbTd(totals.n_app_koor, 'db-g-impl', true) +
    _dbTd(totals.n_closed,   'db-g-closed', true) +
    (showOverdue ? _dbTd(totals.n_overdue, 'db-g-overdue', true) : '') +
    _dbTdTotal(totals.n_open + totals.n_tpp_dh + totals.n_tpp_aud + totals.n_tpp_koor +
               totals.n_open_impl + totals.n_app_dh + totals.n_app_aud + totals.n_app_koor +
               totals.n_closed + totals.n_overdue, true) +
  '</tr>';

  // ── Pending verification note ─────────────────────────────
  var pendingNote = (s.pending_verification || 0) > 0
    ? '<div style="padding:10px 16px;background:rgba(245,158,11,.08);border-top:1px solid var(--border);' +
        'font-size:12px;color:var(--amber,#f59e0b);display:flex;align-items:center;gap:6px">' +
        '<i data-lucide="info" style="width:13px;height:13px;flex-shrink:0"></i>' +
        (s.pending_verification) + ' temuan dalam status <strong>Menunggu Verifikasi Koordinator</strong> tidak ditampilkan di tabel ini.' +
      '</div>'
    : '';

  var inAuditCount = (s.total || 0) - (
    (s.pending_verification || 0) + (s.open || 0) +
    (s.tpp_or_dept_head || 0) + (s.tpp_or_auditor || 0) + (s.tpp_or_koordinator || 0) +
    (s.open_impl || 0) +
    (s.app_dept_head || 0) + (s.app_auditor || 0) + (s.app_koordinator || 0) +
    (s.closed || 0) + (s.overdue || 0)
  );
  var inAuditNote = inAuditCount > 0
    ? '<div style="padding:10px 16px;background:rgba(59,130,246,.06);border-top:1px solid var(--border);' +
        'font-size:12px;color:var(--blue,#3b82f6);display:flex;align-items:center;gap:6px">' +
        '<i data-lucide="info" style="width:13px;height:13px;flex-shrink:0"></i>' +
        inAuditCount + ' temuan dari audit yang sedang berjalan belum masuk ke alur tindak lanjut.' +
      '</div>'
    : '';

  return '<div class="card">' +
    '<div class="card-header" style="cursor:pointer;user-select:none" onclick="_dbToggleApproval()">' +
      '<div>' +
        '<div class="card-title">Status Tindak Lanjut Temuan</div>' +
        '<div class="card-subtitle">Progress TPP dan implementasi per area</div>' +
      '</div>' +
      '<button style="display:inline-flex;align-items:center;gap:5px;' +
        'padding:5px 10px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;' +
        'border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);' +
        'cursor:pointer" id="db-approval-toggle-btn">' +
        '<svg id="db-approval-chevron" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .25s;transform:rotate(0deg)">' +
          '<polyline points="6 9 12 15 18 9"/>' +
        '</svg>' +
        '<span id="db-approval-toggle-label">Sembunyikan</span>' +
      '</button>' +
    '</div>' +
    '<div id="db-approval-body">' +
      '<div style="overflow-x:auto;max-height:520px;overflow-y:auto">' +
        '<table class="db-tbl">' +
          '<thead>' + gh + ch + '</thead>' +
          '<tbody>' + dataRows + totalRow + '</tbody>' +
        '</table>' +
      '</div>' +
      pendingNote +
      inAuditNote +
    '</div>' +
  '</div>';
}

function _dbToggleApproval() {
  var body    = document.getElementById('db-approval-body');
  var chevron = document.getElementById('db-approval-chevron');
  var label   = document.getElementById('db-approval-toggle-label');
  if (!body) return;
  var isHidden = body.style.display === 'none';
  body.style.display      = isHidden ? '' : 'none';
  if (chevron) chevron.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(-90deg)';
  if (label)   label.textContent       = isHidden ? 'Sembunyikan' : 'Tampilkan';
}

function _dbTd(n, groupClass, isTotalRow) {
  var cls = groupClass;
  if (n > 0) cls += ' db-pos';
  else cls += ' db-zero';
  return '<td class="' + cls + '">' + (n > 0 ? n : '—') + '</td>';
}

function _dbTdTotal(n, isTotalRow) {
  return '<td style="' +
    'font-size:' + (isTotalRow ? '14px' : '13px') + ';' +
    'font-weight:800;' +
    'color:var(--text);' +
    'text-align:center;' +
    'vertical-align:middle;' +
    'background:var(--surface2);' +
    'border-top:none;' +
    'border-bottom:none;' +
    'border-right:none;' +
  '">' + (n > 0 ? n : '—') + '</td>';
}

// ════════════════════════════════════════════════════════════
//  DATA HELPERS
// ════════════════════════════════════════════════════════════

function _dbBuildTableData(agendas, findings) {
  return agendas.map(function(ag) {
    var af = findings.filter(function(f) { return f.agenda_id === ag.agenda_id; });
    return {
      dept:      ag.dept     || ag.area_id || '—',
      kategori:  ag.kategori || '',
      area_id:   ag.area_id,
      agenda_id: ag.agenda_id,
      n_open:       _dbCount(af, 'OPEN'),
      n_tpp_dh:     _dbCount(af, 'TPP_OR_DEPT_HEAD'),
      n_tpp_aud:    _dbCount(af, 'TPP_OR_AUDITOR'),
      n_tpp_koor:   _dbCount(af, 'TPP_OR_KOORDINATOR'),
      n_open_impl:  _dbCount(af, 'OPEN_IMPL'),
      n_app_dh:     _dbCount(af, 'APP_DEPT_HEAD'),
      n_app_aud:    _dbCount(af, 'APP_AUDITOR'),
      n_app_koor:   _dbCount(af, 'APP_KOORDINATOR'),
      n_closed:     _dbCount(af, 'CLOSED'),
      n_overdue:    _dbCount(af, 'OVERDUE'),
    };
  });
}

function _dbCount(findings, status) {
  return findings.filter(function(f) { return f.finding_status === status; }).length;
}

function _dbCalcTotals(rows) {
  var keys = [
    'n_open','n_tpp_dh','n_tpp_aud','n_tpp_koor',
    'n_open_impl','n_app_dh','n_app_aud','n_app_koor',
    'n_closed','n_overdue'
  ];
  var t = {};
  keys.forEach(function(k) {
    t[k] = rows.reduce(function(acc, r) { return acc + (r[k] || 0); }, 0);
  });
  return t;
}

function _dbPct(n, total) {
  return total > 0 ? Math.round((n / total) * 100) : 0;
}
