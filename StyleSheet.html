<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');

  /* ── Variables ─────────────────────────────────────────── */
  :root {
    --navy:       #0f1f3d;
    --navy-light: #1a3260;
    --blue:       #2563eb;
    --blue-light: #3b82f6;
    --cyan:       #06b6d4;
    --teal:       #0d9488;
    --purple:     #7c3aed;
    --rose:       #e11d48;
    --amber:      #d97706;
    --emerald:    #059669;
    --slate:      #64748b;
    --slate-light:#94a3b8;
    --bg:         #f0f4f8;
    --surface:    #ffffff;
    --surface2:   #f8fafc;
    --border:     #e2e8f0;
    --text:       #0f172a;
    --text-muted: #64748b;
    --sidebar-w:  240px;
    --radius:     14px;
    --radius-sm:  8px;
    --shadow:     0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.08);
    --shadow-lg:  0 8px 32px rgba(0,0,0,.12);
  }

  /* ── Reset ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }
  a { text-decoration: none; color: inherit; }
  button { cursor: pointer; font-family: inherit; }
  input, textarea, select { font-family: inherit; }

  /* ── Layout ─────────────────────────────────────────────── */
  #app {
    display: grid;
    grid-template-columns: 240px 1fr;
    height: 100vh;
    overflow: hidden;
    transition: grid-template-columns .25s ease;
  }
  #app.sidebar-collapsed {
    grid-template-columns: 56px 1fr;
  }

  /* ── Sidebar ─────────────────────────────────────────────── */
  #sidebar {
    background: var(--navy);
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: sticky;
    top: 0;
    overflow: hidden;
    transition: width .25s ease;
    z-index: 100;
    flex-shrink: 0;
  }
  #sidebar::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(37,99,235,.35) 0%, transparent 70%);
    pointer-events: none;
  }
  #sidebar::after {
    content: '';
    position: absolute;
    bottom: 40px; left: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(6,182,212,.2) 0%, transparent 70%);
    pointer-events: none;
  }

  .sidebar-logo {
    padding: 20px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    flex-shrink: 0;
  }
  .sidebar-logo .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--blue), var(--cyan));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(37,99,235,.4);
  }
  .sidebar-logo .logo-text { color: #fff; font-weight: 700; font-size: 14px; line-height: 1.3; }
  .sidebar-logo .logo-sub  { color: rgba(255,255,255,.45); font-size: 10px; font-weight: 400; }

  .logo-text-wrap {
    overflow: hidden;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }

  .sidebar-toggle-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,.6);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    margin-left: auto;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color .15s, background .15s;
  }
  .sidebar-toggle-btn:hover {
    color: #fff;
    background: rgba(255,255,255,.1);
  }

  .sidebar-period {
    margin: 10px 12px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 11px;
    color: rgba(255,255,255,.6);
    flex-shrink: 0;
  }

  .sidebar-nav {
    flex: 1;
    padding: 8px 10px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .nav-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: rgba(255,255,255,.3);
    padding: 12px 10px 6px;
    white-space: nowrap;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 9px;
    color: rgba(255,255,255,.6);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    margin-bottom: 2px;
    position: relative;
    white-space: nowrap;
  }
  .nav-item:hover { background: rgba(255,255,255,.08); color: #fff; }
  .nav-item.active {
    background: linear-gradient(135deg, rgba(37,99,235,.5), rgba(6,182,212,.3));
    color: #fff;
    box-shadow: 0 2px 8px rgba(37,99,235,.3);
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 60%;
    background: var(--cyan);
    border-radius: 0 3px 3px 0;
  }

  /* ── Mobile nav badge ───────────────────────────────────── */
  .mob-nav-badge {
    position: absolute;
    top: 4px;
    right: calc(50% - 18px);
    background: var(--rose);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 20px;
    min-width: 16px;
    text-align: center;
    line-height: 14px;
    pointer-events: none;
  }
  .nav-label {
    white-space: nowrap;
    overflow: hidden;
    flex: 1;
    min-width: 0;
  }
  .nav-badge {
    margin-left: auto;
    background: var(--rose);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 20px;
    min-width: 18px;
    text-align: center;
  }

  .sidebar-user {
    padding: 12px 14px;
    border-top: 1px solid rgba(255,255,255,.08);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .user-avatar {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 13px;
    flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name  { color: #fff; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role  { color: rgba(255,255,255,.45); font-size: 10px; }

  /* ── Sidebar Collapsed ───────────────────────────────────── */
  #sidebar.collapsed .logo-text-wrap,
  #sidebar.collapsed .nav-label,
  #sidebar.collapsed .user-info,
  #sidebar.collapsed .sidebar-period,
  #sidebar.collapsed .nav-section-label,
  #sidebar.collapsed .logo-icon {
    display: none;
  }
  #sidebar.collapsed .sidebar-logo {
    justify-content: center;
    padding: 14px 8px;
    gap: 0;
  }
  #sidebar.collapsed .sidebar-toggle-btn {
    margin-left: 0;
    display: flex;
  }
  #sidebar.collapsed .nav-item {
    justify-content: center;
    padding: 10px 0;
  }
  #sidebar.collapsed .sidebar-user {
    justify-content: center;
    padding: 12px 0;
  }
  #sidebar.collapsed .nav-item:hover::after {
    content: attr(title);
    position: absolute;
    left: calc(100% + 8px);
    top: 50%;
    transform: translateY(-50%);
    background: #1e2a3a;
    color: #fff;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    white-space: nowrap;
    z-index: 999;
    pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }

  /* ── Main Content ─────────────────────────────────────────── */
  #main {
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* ── Top Bar ─────────────────────────────────────────────── */
  #topbar {
    background: transparent;
    border-bottom: none;
    padding: 10px 28px 0;
    height: auto;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 50;
    gap: 16px;
  }

  /* ── Page Content ─────────────────────────────────────────── */
  #page-content { padding: 24px 28px; flex: 1; }

  /* ── Cards ─────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .card-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .card-title    { font-size: 15px; font-weight: 700; color: var(--text); }
  .card-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .card-body     { padding: 22px; }

  /* ── Stat Cards ─────────────────────────────────────────── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .stat-card.blue::before    { background: linear-gradient(90deg, var(--blue), var(--cyan)); }
  .stat-card.amber::before   { background: linear-gradient(90deg, var(--amber), #f59e0b); }
  .stat-card.purple::before  { background: linear-gradient(90deg, var(--purple), #a78bfa); }
  .stat-card.rose::before    { background: linear-gradient(90deg, var(--rose), #fb7185); }
  .stat-card.teal::before    { background: linear-gradient(90deg, var(--teal), #2dd4bf); }
  .stat-card.emerald::before { background: linear-gradient(90deg, var(--emerald), #34d399); }
  .stat-value { font-size: 32px; font-weight: 800; color: var(--text); line-height: 1; font-family: 'DM Mono', monospace; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }

  /* ── Buttons ─────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    border: none;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--blue), var(--blue-light));
    color: #fff;
    box-shadow: 0 2px 8px rgba(37,99,235,.35);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,.45); }
  .btn-success {
    background: linear-gradient(135deg, var(--emerald), #10b981);
    color: #fff;
    box-shadow: 0 2px 8px rgba(5,150,105,.3);
  }
  .btn-danger {
    background: linear-gradient(135deg, var(--rose), #f43f5e);
    color: #fff;
    box-shadow: 0 2px 8px rgba(225,29,72,.3);
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { border-color: var(--blue); color: var(--blue); background: rgba(37,99,235,.05); }
  .btn-ghost  { background: transparent; color: var(--text-muted); padding: 7px 12px; }
  .btn-ghost:hover { background: var(--bg); color: var(--text); }
  .btn-sm   { padding: 6px 12px; font-size: 12px; }
  .btn-icon { padding: 8px; border-radius: var(--radius-sm); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

  /* ── Badges ─────────────────────────────────────────────── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .02em;
  }
  .badge-blue    { background: #dbeafe; color: #1d4ed8; }
  .badge-amber   { background: #fef3c7; color: #92400e; }
  .badge-rose    { background: #ffe4e6; color: #9f1239; }
  .badge-emerald { background: #d1fae5; color: #065f46; }
  .badge-purple  { background: #ede9fe; color: #5b21b6; }
  .badge-slate   { background: #f1f5f9; color: #475569; }
  .badge-teal    { background: #ccfbf1; color: #0f766e; }

  /* ── Forms ─────────────────────────────────────────────── */
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .form-label .required { color: var(--rose); margin-left: 3px; }
  .form-hint  { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .form-control {
    width: 100%;
    padding: 9px 13px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text);
    background: var(--surface);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  .form-control:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
  textarea.form-control { resize: vertical; min-height: 90px; }
  .form-control::placeholder { color: var(--slate-light); }
  .form-row       { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }

  /* ── Tables ─────────────────────────────────────────────── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    padding: 11px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td { padding: 13px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .td-mono { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); }

  /* ── Modal ─────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(15,31,61,.6);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(20px);
    transition: transform .25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-lg { max-width: 780px; }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-body  { padding: 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    position: sticky;
    bottom: 0;
    background: var(--surface);
  }

  /* ── Approval Chain ──────────────────────────────────────── */
  .approval-chain {
    display: flex;
    align-items: center;
    margin: 16px 0;
    flex-wrap: wrap;
  }
  .chain-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
    position: relative;
    min-width: 80px;
  }
  .chain-step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 16px; left: 60%; right: -10%;
    height: 2px;
    background: var(--border);
    z-index: 0;
  }
  .chain-step.done:not(:last-child)::after { background: var(--emerald); }
  .chain-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    background: var(--bg);
    border: 2px solid var(--border);
    color: var(--text-muted);
    z-index: 1;
    transition: all .3s;
  }
  .chain-step.done     .chain-dot { background: var(--emerald); border-color: var(--emerald); color: #fff; }
  .chain-step.active   .chain-dot { background: var(--blue);    border-color: var(--blue);    color: #fff; box-shadow: 0 0 0 4px rgba(37,99,235,.2); }
  .chain-step.rejected .chain-dot { background: var(--rose);    border-color: var(--rose);    color: #fff; }
  .chain-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-align: center; }
  .chain-step.done   .chain-label { color: var(--emerald); }
  .chain-step.active .chain-label { color: var(--blue); }

  /* ── File Upload ─────────────────────────────────────────── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--surface2);
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--blue);
    background: rgba(37,99,235,.04);
  }
  .upload-text { font-size: 13px; color: var(--text-muted); }
  .upload-text strong { color: var(--blue); }
  .upload-previews { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
  .upload-preview {
    position: relative;
    width: 80px; height: 80px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .upload-preview img { width: 100%; height: 100%; object-fit: cover; }
  .upload-preview .remove-btn {
    position: absolute; top: 2px; right: 2px;
    width: 18px; height: 18px;
    background: rgba(0,0,0,.6);
    color: #fff; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; cursor: pointer; border: none;
  }
  .file-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 11px;
    color: var(--text);
  }

  /* ── Toast ──────────────────────────────────────────────── */
  #toast-container {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
  }
  .toast {
    background: var(--navy);
    color: #fff;
    padding: 12px 18px;
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; gap: 10px;
    pointer-events: all;
    animation: toastIn .3s ease forwards;
    min-width: 260px; max-width: 380px;
    border-left: 4px solid var(--cyan);
  }
  .toast.success { border-color: var(--emerald); }
  .toast.error   { border-color: var(--rose); }
  .toast.warning { border-color: var(--amber); }
  @keyframes toastIn {
    from { transform: translateX(100%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  /* ── Empty State ─────────────────────────────────────────── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .empty-desc  { font-size: 13px; }

  /* ── Loading ─────────────────────────────────────────────── */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  .spinner.dark {
    border-color: rgba(37,99,235,.2);
    border-top-color: var(--blue);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .page-loader {
    display: flex; align-items: center; justify-content: center;
    height: 300px; flex-direction: column; gap: 16px;
    color: var(--text-muted); font-size: 13px;
  }

  /* ── Divider ─────────────────────────────────────────────── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* ── Tabs ─────────────────────────────────────────────────── */
  .tabs { display: flex; gap: 2px; border-bottom: 2px solid var(--border); margin-bottom: 22px; }
  .tab-btn {
    padding: 10px 18px;
    font-size: 13px; font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    transition: all .2s;
    border-radius: 6px 6px 0 0;
  }
