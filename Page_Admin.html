function _editAgShowDD() {
  var dd = document.getElementById('edit-ag-dd');
  if (dd) dd.style.display = '';
  setTimeout(function() {
    document.addEventListener('click', function _close(e) {
      var inp = document.getElementById('edit-ag-auditor-search');
      var dd2 = document.getElementById('edit-ag-dd');
      if (dd2 && inp && !dd2.contains(e.target) && e.target !== inp) {
        dd2.style.display = 'none';
        document.removeEventListener('click', _close);
      }
    });
  }, 10);
}

function _editAgFilterDD() {
  var inp = document.getElementById('edit-ag-auditor-search');
  var q   = inp ? inp.value.toLowerCase() : '';
  var s   = window._editAg;
  var dd  = document.getElementById('edit-ag-dd');
  if (!dd) return;
  dd.innerHTML = s.auditors.filter(function(u) {
    return !q || u.nama.toLowerCase().includes(q);
  }).map(function(u) {
    var checked = s.auditorEmails.includes(u.email);
    return '<div onclick="_editAgToggleAuditor(\'' + escHtml(u.email) + '\')" ' +
      'style="padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;' +
        (checked ? 'background:var(--bg)' : '') + '">' +
      '<i data-lucide="' + (checked ? 'check-square' : 'square') + '" ' +
        'style="width:14px;height:14px;flex-shrink:0;color:' + (checked ? 'var(--blue)' : 'var(--text-muted)') + '"></i>' +
      '<span>' + escHtml(u.nama) + '</span>' +
    '</div>';
  }).join('') || '<div style="padding:10px 12px;font-size:12px;color:var(--text-muted)">Tidak ada auditor.</div>';
  dd.style.display = '';
  lucide.createIcons();
}

function _editAgToggleAuditor(email) {
  var s   = window._editAg;
  var idx = s.auditorEmails.indexOf(email);
  if (idx === -1) {
    s.auditorEmails.push(email);
  } else {
    s.auditorEmails.splice(idx, 1);
    if (s.leadAuditor === email) s.leadAuditor = '';
  }
  if (s.auditorEmails.length === 1) s.leadAuditor = s.auditorEmails[0];
  else if (!s.auditorEmails.includes(s.leadAuditor)) s.leadAuditor = '';

  // Re-render tab content untuk refresh chips + dropdown
  var content = document.getElementById('edit-ag-tab-content');
  if (content) { content.innerHTML = _renderEditAuditorTab(); lucide.createIcons(); }
}

function _editAgSetLead(email) {
  var s = window._editAg;
  if (s.auditorEmails.length <= 1) return;
  s.leadAuditor = (s.leadAuditor === email) ? '' : email;
  var content = document.getElementById('edit-ag-tab-content');
  if (content) { content.innerHTML = _renderEditAuditorTab(); lucide.createIcons(); }
}

function _editAgClTab(tab) {
  window._editAg._clTab = tab;
  var content = document.getElementById('edit-ag-tab-content');
  if (content) { content.innerHTML = _renderEditChecklistTab(); lucide.createIcons(); }
}

function _editAgClSearch(val) {
  window._editAg._clSearch = val;
  var content = document.getElementById('edit-ag-tab-content');
  if (!content) return;
  // Re-render isi tab, lalu kembalikan fokus + posisi kursor ke input search
  content.innerHTML = _renderEditChecklistTab();

  var inp = document.getElementById('edit-ag-cl-search');
  if (inp) {

    inp.setSelectionRange(len, len);

function _editAgToggleItem(itemId, checked) {
  window._editAg.selected[itemId] = checked;
  // Refresh count
  var content = document.getElementById('edit-ag-tab-content');
  if (content) { content.innerHTML = _renderEditChecklistTab(); lucide.createIcons(); }
}

function _editAgToggleGroup(persyaratan, checked) {
  var s = window._editAg;
  s.allItems.forEach(function(item) {
    if (item.persyaratan === persyaratan) s.selected[item.item_id] = checked;
  });
  var content = document.getElementById('edit-ag-tab-content');
  if (content) { content.innerHTML = _renderEditChecklistTab(); lucide.createIcons(); }
}

async function _saveEditAgenda(btn) {
  var s = window._editAg;
  if (s.auditorEmails.length === 0) return toast('Pilih minimal 1 auditor.', 'error');

  var selectedIds = Object.keys(s.selected).filter(function(id) { return s.selected[id]; });
  if (selectedIds.length === 0) return toast('Pilih minimal 1 checklist item.', 'error');

  // Cek apa yang berubah
  var originalEmails  = (s.ag.auditor_emails || '').split(',').map(function(e){ return e.trim(); }).filter(Boolean).sort();
  var newEmails       = s.auditorEmails.slice().sort();
  var originalLead    = s.ag.lead_auditor || '';
  var auditorChanged  = JSON.stringify(originalEmails) !== JSON.stringify(newEmails) || originalLead !== s.leadAuditor;

  var originalItemIds = (s._originalItemIds || []).slice().sort();
  var newItemIds      = selectedIds.slice().sort();
  var checklistChanged = JSON.stringify(originalItemIds) !== JSON.stringify(newItemIds);

  // Kalau tidak ada yang berubah
  if (!auditorChanged && !checklistChanged) {
    toast('Tidak ada perubahan.', 'info');
    return;
  }

  // Session perlu di-reset hanya kalau checklist berubah
  // Kalau hanya auditor berubah, session tidak perlu di-reset
  var needReset = (s.ag.status === 'STARTED') && checklistChanged;

  if (needReset) {
    var ok = await showConfirm({
      title:       'Simpan Perubahan',
      message:     'Checklist diubah dan audit sudah dimulai.',
      detail:      'Semua hasil audit yang sudah diisi akan dihapus dan auditor harus mengisi ulang dari awal.',
      confirmText: 'Simpan & Reset Audit',
      danger:      true,
    });
    if (!ok) return;
  }

  var restore = btnLoading(btn, 'Menyimpan...');
  try {
    await api('UPDATE_AGENDA', {
      agenda_id:      s.ag.agenda_id,
      period_id:      s.ag.period_id,
      auditor_emails: auditorChanged  ? s.auditorEmails.join(',') : null,
      lead_auditor:   auditorChanged  ? s.leadAuditor             : null,
      item_ids:       checklistChanged ? selectedIds              : null,
    });
    clearCache('GET_AGENDAS_BY_PERIOD');
    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    clearCache('GET_DASHBOARD');
    toast('Audit plan berhasil diperbarui.', 'success');
    closeModal('edit-agenda-modal');
    _togglePeriodExpand(s.ag.period_id, '');
    _togglePeriodExpand(s.ag.period_id, '');
  } catch(err) { toast(err.message, 'error'); restore(); }
}

async function _deleteAgendaConfirm(btn) {
  var s  = window._editAg;
  var ok = await showConfirm({
    title:       'Hapus Audit Plan',
    message:     'Hapus audit plan untuk ' + s.ag.dept + '?',
    detail:      (s.ag.status === 'STARTED' || s.ag.status === 'DONE')
      ? 'Semua hasil audit yang sudah diisi untuk area ini akan ikut dihapus.'
      : 'Audit plan akan dihapus permanen.',
    confirmText: 'Hapus',
    danger:      true,
  });
  if (!ok) return;
  var restore = btnLoading(btn, 'Menghapus...');
  try {
    await api('DELETE_AGENDA', {
      agenda_id: s.ag.agenda_id,
      period_id: s.ag.period_id,
    });
    clearCache('GET_AGENDAS_BY_PERIOD');
    clearCache('GET_ALL_FINDINGS_BY_PERIOD');
    clearCache('GET_DASHBOARD');
    toast('Audit plan berhasil dihapus.', 'success');
    closeModal('edit-agenda-modal');
    _togglePeriodExpand(s.ag.period_id, '');
    _togglePeriodExpand(s.ag.period_id, '');
  } catch(err) { toast(err.message, 'error'); restore(); }
}

function _ag1FilterAreas() {
  var list = document.getElementById('ag1-area-list');
  if (list) { list.innerHTML = _renderStep1AreaList(); lucide.createIcons(); }
}

async function _agendaStep1Next() {
  var btn   = document.getElementById('ag-step1-next');
  var state = window._agendaState;

  // Validasi: semua area yang ada harus punya auditor
  var invalid = state.areas.filter(function(a) { return a.auditorEmails.length === 0; });
  if (state.areas.length === 0) return toast('Tidak ada area yang bisa diaudit.', 'error');
  if (invalid.length > 0) {
    window._ag1Validated = true;
    var list = document.getElementById('ag1-area-list');
    if (list) { list.innerHTML = _renderStep1AreaList(); lucide.createIcons(); }
    return toast(invalid.length + ' area belum di-assign auditor.', 'error');
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:13px;height:13px;border-width:2px"></div> Memuat...';

  try {
    // Load checklist untuk semua kategori unik
    var kategoriList = [...new Set(state.areas.map(function(a) { return a.kategori; }))];
    var results = await Promise.all(kategoriList.map(function(kat) {
      return api('GET_CHECKLIST_FOR_AGENDA', { kategori: kat });
    }));
    // Simpan ke masing-masing area
    state.areas.forEach(function(area) {
      var idx      = kategoriList.indexOf(area.kategori);
      var checklist = results[idx] || [];
      area.checklist = checklist;
      area.selected  = {};
      checklist.forEach(function(item) { area.selected[item.item_id] = true; });
      area.confirmed = false;
    });
    state.activeAreaIdx = 0;
    _renderAgendaStep2();
  } catch(err) {
    toast(err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Pilih Checklist <i data-lucide="arrow-right" style="width:14px;height:14px;margin-left:4px"></i>';
    lucide.createIcons();
  }
}

function _ag2ProgressText() {
  var state      = window._agendaState;
  var confirmed  = state.areas.filter(function(a) { return a.confirmed; }).length;
  return confirmed + ' / ' + state.areas.length + ' area dikonfirmasi';
}

function _ag2ItemCountText() {
  var state = window._agendaState;
  var area  = state.areas[state.activeAreaIdx];
  if (!area) return '';
  var count = Object.values(area.selected).filter(Boolean).length;
  return count + ' dari ' + area.checklist.length + ' item dipilih';
}

function _renderAg2Sidebar() {
  var state = window._agendaState;
  return state.areas.map(function(area, idx) {
    var isActive    = idx === state.activeAreaIdx;
    var isConfirmed = area.confirmed;
    return '<div onclick="_ag2SelectArea(' + idx + ')" ' +
      'style="display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;' +
        (isActive ? 'background:var(--blue);color:#fff' : 'background:transparent') + '">' +
      '<div style="width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;' +
        (isConfirmed
          ? 'background:var(--emerald,#10b981);color:#fff'
          : (isActive ? 'background:rgba(255,255,255,.25);color:#fff' : 'background:var(--border);color:var(--text-muted)')) + '">' +
        (isConfirmed ? '✓' : (idx + 1)) +
      '</div>' +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;' +
          (isActive ? 'color:#fff' : '') + '">' + escHtml(area.dept) + '</div>' +
        '<div style="font-size:10px;' + (isActive ? 'color:rgba(255,255,255,.7)' : 'color:var(--text-muted)') + '">' + escHtml(area.kategori) + '</div>' +
      '</div>' +
      (isConfirmed && !isActive ? '<i data-lucide="check-circle" style="width:13px;height:13px;color:var(--emerald,#10b981);flex-shrink:0"></i>' : '') +
    '</div>';
  }).join('');
}

function _renderAg2FilterBar() {
  var state    = window._agendaState;
  var area     = state.areas[state.activeAreaIdx];
  if (!area) return '';
  var checklist = area.checklist;
  var general   = checklist.filter(function(i) { return i.tipe === 'GENERAL'; });
  var khusus    = checklist.filter(function(i) { return i.tipe === 'KHUSUS'; });
  var labelSet  = {};
  checklist.forEach(function(item) {
    if (item.labels) item.labels.split(',').forEach(function(l) {
      var t = l.trim(); if (t) labelSet[t] = true;
    });
  });
  var allLabels = Object.keys(labelSet).sort();
  var curTab    = window._ag2CurrentTab || 'general';
  var curLabel  = window._ag2LabelFilter;

  var tabs =
    '<button class="btn btn-sm ' + (curTab === 'general' ? 'btn-primary' : 'btn-outline') + '" ' +
      'onclick="_ag2SetTab(\'general\')" style="font-size:11px">General (' + general.length + ')</button>' +
    (khusus.length
      ? '<button class="btn btn-sm ' + (curTab === 'khusus' ? 'btn-primary' : 'btn-outline') + '" ' +
          'onclick="_ag2SetTab(\'khusus\')" style="font-size:11px">' + escHtml(area.kategori) + ' (' + khusus.length + ')</button>'
      : '') +
    (allLabels.length
      ? '<span style="width:1px;background:var(--border);height:20px;margin:0 4px"></span>' +
        allLabels.map(function(label) {
          var isActive = curLabel === label;
          return '<button class="btn btn-sm ' + (isActive ? 'btn-primary' : 'btn-ghost') + '" ' +
            'onclick="_ag2ToggleLabel(\'' + escHtml(label).replace(/'/g,"\\'") + '\')" style="font-size:11px">' +
            escHtml(label) + '</button>';
        }).join('')
      : '');

  return tabs;
}

function _ag2SetTab(tab) {
  window._ag2CurrentTab  = tab;
  window._ag2LabelFilter = null;
  _ag2RefreshPanel();
  // Refresh filter bar active state
  var bar = document.getElementById('ag2-filter-bar');
  if (bar) { bar.innerHTML = _renderAg2FilterBar(); lucide.createIcons(); }
}

function _ag2ToggleLabel(label) {
  window._ag2LabelFilter = (window._ag2LabelFilter === label) ? null : label;
  _ag2RefreshPanel();
  var bar = document.getElementById('ag2-filter-bar');
  if (bar) { bar.innerHTML = _renderAg2FilterBar(); lucide.createIcons(); }
}

function _ag2SelectArea(idx) {
  window._agendaState.activeAreaIdx = idx;
  window._ag2CurrentTab  = 'general';
  window._ag2LabelFilter = null;
  // Refresh sidebar
  var sb = document.getElementById('ag2-sidebar');
  if (sb) { sb.innerHTML = _renderAg2Sidebar(); lucide.createIcons(); }
  // Refresh filter bar
  var bar = document.getElementById('ag2-filter-bar');
  if (bar) { bar.innerHTML = _renderAg2FilterBar(); lucide.createIcons(); }
  // Refresh panel
  _ag2RefreshPanel();
}

function _ag2RefreshPanel() {
  var panel = document.getElementById('ag2-checklist-panel');
  if (panel) { panel.innerHTML = _renderAg2ChecklistPanel(); lucide.createIcons(); }
  var cnt = document.getElementById('ag2-item-count');
  if (cnt) cnt.textContent = _ag2ItemCountText();
}

function _renderAg2ChecklistPanel() {
  var state    = window._agendaState;
  var area     = state.areas[state.activeAreaIdx];
  if (!area) return '<div class="empty-state" style="padding:60px"><div class="empty-desc">Pilih area di sidebar.</div></div>';

  var tab      = window._ag2CurrentTab || 'general';
  var labelF   = window._ag2LabelFilter;
  var items    = area.checklist.filter(function(i) {
    var matchTab = tab === 'general' ? i.tipe === 'GENERAL' : i.tipe === 'KHUSUS';
    var matchLbl = !labelF || (i.labels && i.labels.split(',').map(function(l){ return l.trim(); }).includes(labelF));
    return matchTab && matchLbl;
  }).sort(function(a, b) { return Number(a.nomor) - Number(b.nomor); });

  if (!items.length) return '<div style="padding:40px;text-align:center;color:var(--text-muted);font-size:13px">Tidak ada item.</div>';

  // Group by persyaratan
  var groups = [];
  var groupMap = {};
  items.forEach(function(item) {
    var key = item.persyaratan;
    if (!groupMap[key]) {
      groupMap[key] = { persyaratan: key, aspek: item.aspek, items: [] };
      groups.push(groupMap[key]);
    }
    groupMap[key].items.push(item);
  });

  var html = '';

  groups.forEach(function(group) {
    var groupItems   = group.items;
    var allChk       = groupItems.every(function(i) { return area.selected[i.item_id]; });
    var someChk      = groupItems.some(function(i)  { return area.selected[i.item_id]; });
    var indeterminate = someChk && !allChk;
    var groupId      = 'ag2-grp-' + escHtml(group.persyaratan).replace(/[^a-z0-9]/gi,'_').slice(0,20);

    html +=
      '<div style="margin-bottom:14px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden">' +
        // Group header
        '<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg);border-bottom:1px solid var(--border)">' +
          '<input type="checkbox" id="' + groupId + '" ' +
            (allChk ? 'checked' : '') + ' ' +
            'style="width:15px;height:15px;accent-color:var(--blue);flex-shrink:0" ' +
            'onchange="_ag2ToggleGroup(\'' + escHtml(group.persyaratan).replace(/'/g,"\\'") + '\',this.checked)" ' +
            'onclick="this.indeterminate=false">' +
          '<span class="badge badge-blue" style="font-size:10px">' + escHtml(group.aspek) + '</span>' +
          '<span style="font-size:12px;font-weight:600;flex:1">' + escHtml(group.persyaratan) + '</span>' +
          '<span style="font-size:11px;color:var(--text-muted)">' + groupItems.filter(function(i){ return area.selected[i.item_id]; }).length + '/' + groupItems.length + '</span>' +
        '</div>' +
        // Check items
        groupItems.map(function(item) {
          var isSelected  = !!area.selected[item.item_id];
          var isHighlight = labelF && item.labels &&
            item.labels.split(',').map(function(l){ return l.trim(); }).includes(labelF);
          return '<div style="display:flex;gap:10px;align-items:flex-start;padding:9px 12px;' +
            (isHighlight ? 'background:rgba(245,158,11,.06)' : '') + ';' +
            (!isSelected ? 'opacity:.5' : '') + '">' +
            '<input type="checkbox" class="ag2-item-chk" value="' + escHtml(item.item_id) + '" ' +
              (isSelected ? 'checked' : '') + ' ' +
              'style="width:14px;height:14px;accent-color:var(--blue);flex-shrink:0;margin-top:2px" ' +
              'onchange="_ag2ToggleItem(\'' + escHtml(item.item_id) + '\',this.checked)">' +
            '<div style="flex:1;min-width:0">' +
              '<div style="font-size:13px;margin-bottom:3px">' + escHtml(item.check_item) + '</div>' +
              (item.standar_check_item
                ? '<div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">' +
                    '<i data-lucide="info" style="width:10px;height:10px;vertical-align:middle"></i> ' + escHtml(item.standar_check_item) + '</div>'
                : '') +
              (item.labels
                ? '<div>' + item.labels.split(',').map(function(l) {
                    var t = l.trim();
                    return '<span style="font-size:10px;padding:1px 6px;border-radius:8px;margin-right:2px;' +
                      (t === labelF ? 'background:var(--amber,#f59e0b);color:#fff' : 'background:var(--bg);border:1px solid var(--border);color:var(--text-muted)') + '">' +
                      escHtml(t) + '</span>';
                  }).join('') + '</div>'
                : '') +
            '</div>' +
          '</div>';
        }).join('') +
      '</div>';

    // Set indeterminate after render
    if (indeterminate) {
      setTimeout(function() {
        var el = document.getElementById(groupId);
        if (el) el.indeterminate = true;
      }, 0);
    }
  });

  return html;
}

function _ag2ToggleItem(itemId, checked) {
  var state = window._agendaState;
  var area  = state.areas[state.activeAreaIdx];
  if (!area) return;
  area.selected[itemId] = checked;
  area.confirmed = false; // reset konfirmasi kalau ada perubahan
  var cnt = document.getElementById('ag2-item-count');
  if (cnt) cnt.textContent = _ag2ItemCountText();
  // Update group header count
  _ag2RefreshGroupHeader(itemId);
  // Update sidebar (status confirmed bisa berubah)
  var sb = document.getElementById('ag2-sidebar');
  if (sb) { sb.innerHTML = _renderAg2Sidebar(); lucide.createIcons(); }
}

function _ag2RefreshGroupHeader(itemId) {
  // Re-render seluruh panel lebih simpel untuk sinkronisasi indeterminate
  // Scroll position dipertahankan
  var panel = document.getElementById('ag2-checklist-panel');
  if (!panel) return;
  var scrollTop = panel.scrollTop;
  panel.innerHTML = _renderAg2ChecklistPanel();
  panel.scrollTop = scrollTop;
  lucide.createIcons();
}

function _ag2ToggleGroup(persyaratan, checked) {
  var state = window._agendaState;
  var area  = state.areas[state.activeAreaIdx];
  if (!area) return;
  area.checklist.forEach(function(item) {
    if (item.persyaratan === persyaratan) area.selected[item.item_id] = checked;
  });
  area.confirmed = false;
  _ag2RefreshPanel();
  var sb = document.getElementById('ag2-sidebar');
  if (sb) { sb.innerHTML = _renderAg2Sidebar(); lucide.createIcons(); }
}

function _ag2SelectAllVisible() {
  var state  = window._agendaState;
  var area   = state.areas[state.activeAreaIdx];
  var tab    = window._ag2CurrentTab || 'general';
  var labelF = window._ag2LabelFilter;
  if (!area) return;
  area.checklist.forEach(function(item) {
    var matchTab = tab === 'general' ? item.tipe === 'GENERAL' : item.tipe === 'KHUSUS';
    var matchLbl = !labelF || (item.labels && item.labels.split(',').map(function(l){ return l.trim(); }).includes(labelF));

  _ag2RefreshPanel();
  var sb = document.getElementById('ag2-sidebar');
  if (sb) { sb.innerHTML = _renderAg2Sidebar(); lucide.createIcons(); }

function _ag2UnselectAllVisible() {
  var state  = window._agendaState;
  var area   = state.areas[state.activeAreaIdx];
  var tab    = window._ag2CurrentTab || 'general';

  if (!area) return;
  area.checklist.forEach(function(item) {

  });

function _ag2ConfirmArea() {
  var state = window._agendaState;
  var area  = state.areas[state.activeAreaIdx];
  if (!area) return;
  var selectedCount = Object.values(area.selected).filter(Boolean).length;
  if (selectedCount === 0) return toast('Pilih minimal 1 checklist item.', 'error');
  area.confirmed = true;
  // Update sidebar
  var sb = document.getElementById('ag2-sidebar');
  if (sb) { sb.innerHTML = _renderAg2Sidebar(); lucide.createIcons(); }
  // Update progress text
  var pt = document.getElementById('ag2-progress-text');
  if (pt) pt.textContent = _ag2ProgressText();
  // Auto-navigate ke area berikutnya yang belum dikonfirmasi
  var nextIdx = state.areas.findIndex(function(a, i) { return i > state.activeAreaIdx && !a.confirmed; });
  if (nextIdx === -1) nextIdx = state.areas.findIndex(function(a) { return !a.confirmed; });
  if (nextIdx !== -1 && nextIdx !== state.activeAreaIdx) {
    _ag2SelectArea(nextIdx);
  } else {
    toast('Area dikonfirmasi ✓', 'success');
  }
}

function _agendaStep2Next() {
  var state    = window._agendaState;
  var unconfirmed = state.areas.filter(function(a) { return !a.confirmed; });
  if (unconfirmed.length > 0) {
    toast(unconfirmed.length + ' area belum dikonfirmasi.', 'error');
    // Navigate ke area yang belum dikonfirmasi
    var idx = state.areas.indexOf(unconfirmed[0]);
    _ag2SelectArea(idx);
    return;
  }
  _renderAgendaStep3();
}

function _ag3DetailHtml(area, general, khusus) {
  function renderGroup(items, label) {
    if (!items.length) return '';
    var lastPersyaratan = null;
    var rows = items.map(function(item) {
      var isNew = item.persyaratan !== lastPersyaratan;
      lastPersyaratan = item.persyaratan;
      return '<tr style="' + (isNew && lastPersyaratan !== null ? 'border-top:2px solid var(--border)' : '') + '">' +
        '<td style="width:36px;text-align:center;color:var(--text-muted);font-size:11px">' + item.nomor + '</td>' +
        '<td style="width:70px">' + (isNew ? '<span class="badge badge-blue" style="font-size:10px">' + escHtml(item.aspek) + '</span>' : '') + '</td>' +
        '<td style="font-size:11px;color:var(--text-muted);width:180px">' + (isNew ? escHtml(item.persyaratan) : '') + '</td>' +
        '<td style="font-size:12px">' + escHtml(item.check_item) + '</td>' +
      '</tr>';
    }).join('');
    return '<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px">' + label + '</div>' +
      '<div class="table-wrap"><table><thead><tr>' +
        '<th style="width:36px">No</th><th style="width:70px">Aspek</th><th style="width:180px">Persyaratan</th><th>Check Item</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table></div></div>';
  }
  return renderGroup(general, 'General') + renderGroup(khusus, escHtml(area.kategori));
}

function _ag3ToggleDetail(idx) {
  var detailEl  = document.getElementById('ag3-detail-' + idx);
  var chevronEl = document.getElementById('ag3-chevron-' + idx);
  if (!detailEl) return;
  var isOpen = detailEl.style.display !== 'none';
  detailEl.style.display  = isOpen ? 'none' : '';

async function _saveAgenda() {
  var btn   = document.getElementById('ag-save-btn');
  var state = window._agendaState;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:13px;height:13px;border-width:2px"></div> Menyimpan...';

  var savedCount  = 0;
  var failedAreas = [];

  for (var i = 0; i < state.areas.length; i++) {
    var area       = state.areas[i];
    var selectedIds = Object.keys(area.selected).filter(function(id) { return area.selected[id]; });
    try {
      var result = await api('CREATE_AGENDA', {
        period_id:      state.periodId,
        area_id:        area.area_id,
        auditor_emails: area.auditorEmails.join(','),
        lead_auditor:   area.leadAuditor,
        jadwal_tanggal: '',
        item_ids:       selectedIds,
      });
      savedCount++;
    } catch(err) {
      failedAreas.push({ dept: area.dept, reason: err.message });
    }
  }

  clearCache('GET_AGENDAS_BY_PERIOD');

  if (failedAreas.length === 0) {
    toast(savedCount + ' audit plan berhasil disimpan!', 'success');
  } else {
    toast(savedCount + ' berhasil, ' + failedAreas.length + ' gagal: ' + failedAreas.map(function(f) { return f.dept; }).join(', '), 'error');
  }

  _closeFullscreen('agenda-fullscreen');
  var _pid = state.periodId;
  _togglePeriodExpand(_pid, '');
  _togglePeriodExpand(_pid, '');
}

function _parseBulkAreaLines() {
  var ta = document.getElementById('bulk-area-input');
  if (!ta) return [];

  var raw  = ta.value;
  var rows = [];
  var i    = 0;

  while (i < raw.length) {
    var cols = [];
    while (i < raw.length) {
      if (raw[i] === '"') {
        i++;
        var val = '';
        while (i < raw.length) {
          if (raw[i] === '"' && raw[i+1] === '"') { val += '"'; i += 2; }
          else if (raw[i] === '"') { i++; break; }
          else { val += raw[i++]; }
        }
        cols.push(val.trim());
      } else {
        var val = '';
        while (i < raw.length && raw[i] !== '\t' && raw[i] !== '\n' && raw[i] !== '\r') {
          val += raw[i++];
        }
        cols.push(val.trim());
      }
      if (i < raw.length && raw[i] === '\t') { i++; continue; }
      if (i < raw.length && (raw[i] === '\n' || raw[i] === '\r')) {
        if (raw[i] === '\r' && raw[i+1] === '\n') i++;
        i++;
      }
      break;
    }

    if (cols.length === 0 || cols.every(function(c) { return !c; })) continue;

    // cols[0]=kategori, cols[1]=dept, cols[2]=nama dept head, cols[3]=area sampling, cols[4]=nama auditee(s)
    var deptHeadName    = (cols[2] || '').trim();
    var auditeeNamesRaw = cols.slice(4).join('\n');

    // Convert newline-separated names in auditee cell
    var auditeeNamesList = auditeeNamesRaw.split(/[\n,]+/)
      .map(function(n) { return n.trim(); })
      .filter(Boolean);

    // Strip dept head dari auditee jika sama
    var deptHeadEmail = nameToEmail(deptHeadName);
    auditeeNamesList = auditeeNamesList.filter(function(n) {
      return nameToEmail(n) !== deptHeadEmail;
    });

    rows.push({
      kategori:        cols[0] || '',
      dept:            cols[1] || '',
      dept_head_name:  deptHeadName,
      dept_head_email: deptHeadEmail,
      area_sampling:   (cols[3] || '').trim(),
      auditee_names:   auditeeNamesList.join('\n'),
      auditee_emails:  auditeeNamesList.map(nameToEmail).join(','),
    });
  }

  return rows;
}

  var items   = _parseBulkAreaLines();

function openBulkUserModal() {
  createModal({
    id:   'bulk-user-modal',
    title: 'Import Banyak User Sekaligus',
    size: 'modal-lg',
    body:
      '<div style="display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-size:12px;margin-bottom:14px;align-items:start">' +
        '<span style="color:var(--text-muted);white-space:nowrap">Urutan kolom</span>' +
        '<span style="font-family:monospace;font-size:12px">' +
          'Nama Lengkap &nbsp;<span style="color:var(--border)">|</span>&nbsp; ' +
          '<span style="color:var(--rose)">Roles *</span>' +
        '</span>' +
        '<span style="color:var(--text-muted);white-space:nowrap">Roles valid</span>' +
        '<span style="font-size:12px">Koordinator &nbsp;·&nbsp; Auditor &nbsp;·&nbsp; kombinasi pisah <code style="background:var(--bg);padding:1px 5px;border-radius:3px">|</code></span>' +
        '<span style="color:var(--text-muted);white-space:nowrap">Format</span>' +
        '<span style="font-size:12px">Paste dari Excel (tab) atau ketik manual (koma). Email dibuat otomatis dari nama.</span>' +
      '</div>' +
      '<textarea class="form-control" id="bulk-user-input" rows="10" ' +
        'placeholder="Florean Salsabila Irdana, Koordinator&#10;Roni Permana, Auditor&#10;Annang Nugroho, Auditor|Koordinator" ' +
        'style="font-family:monospace;font-size:13px;resize:vertical"></textarea>' +
      '<div id="bulk-user-preview" style="margin-top:12px"></div>',
    footer:
      '<span id="bulk-user-count" style="font-size:12px;color:var(--text-muted);margin-right:auto"></span>' +
      '<button class="btn btn-outline" onclick="closeModal(\'bulk-user-modal\')">Batal</button>' +
      '<button class="btn btn-outline btn-sm" onclick="previewBulkUsers()">Preview</button>' +
      '<button class="btn btn-primary" id="bulk-user-save-btn" onclick="singleClick(this,function(){ saveBulkUsers() })">Import Semua</button>',
  });
  var ta = document.getElementById('bulk-user-input');
  if (ta) ta.addEventListener('input', function() {
    var lines = ta.value.split('\n').filter(function(l) { return l.trim(); }).length;
    var el = document.getElementById('bulk-user-count');
    if (el) el.textContent = lines + ' user akan ditambahkan';
  });
}

function _parseBulkUserLines() {
  var ta = document.getElementById('bulk-user-input');
  if (!ta) return [];
  return ta.value.split('\n')
    .map(function(line) { return line.trim(); })
    .filter(Boolean)
    .map(function(line) {
      var sep      = line.includes('\t') ? '\t' : ',';
      var parts    = line.split(sep).map(function(p) { return p.trim(); });
      var nama     = parts[0] || '';
      var rawRoles = (parts[1] || '').replace(/\|/g, ',');
      return {
        nama:  nama,
        email: nameToEmail(nama),
        roles: rawRoles,
      };
    });
}

function previewBulkUsers() {
  var items   = _parseBulkUserLines();
  var preview = document.getElementById('bulk-user-preview');
  if (!preview) return;
  if (!items.length) { preview.innerHTML = ''; return; }
  var validRoles = ['Koordinator', 'Auditor'];
  var rows = items.map(function(u, i) {
    var warn = '';
    if (!u.nama) warn = '⚠ nama kosong';
    else {
      var rArr = u.roles.split(',').map(function(r) { return r.trim(); }).filter(Boolean);
      if (rArr.length === 0) warn = '⚠ roles kosong';
      else {
        var invalid = rArr.find(function(r) { return !validRoles.includes(r); });
        if (invalid) warn = '⚠ role "' + invalid + '" tidak valid';
      }
    }
    var badgeStyle = 'display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;background:var(--bg);border:1px solid var(--border);margin-right:2px';
    var rolesBadges = u.roles.split(',').map(function(r) {
      return '<span style="' + badgeStyle + '">' + escHtml(r.trim()) + '</span>';
    }).join('');
    return '<tr style="font-size:12px' + (warn ? ';color:var(--rose)' : '') + '">' +
      '<td style="padding:4px 8px;color:var(--text-muted)">' + (i+1) + '</td>' +
      '<td style="padding:4px 8px"><strong>' + escHtml(u.nama) + '</strong></td>' +
      '<td style="padding:4px 8px;font-family:monospace;font-size:11px;color:var(--text-muted)">→ ' + escHtml(u.email) + '</td>' +
      '<td style="padding:4px 8px">' + rolesBadges + '</td>' +
      '<td style="padding:4px 8px;color:var(--rose);font-size:11px">' + warn + '</td>' +
    '</tr>';
  }).join('');
  preview.innerHTML =
    '<div style="font-size:12px;font-weight:600;margin-bottom:6px">' + items.length + ' user akan diproses:</div>' +
    '<div style="overflow-x:auto;max-height:200px;overflow-y:auto">' +
      '<table style="width:100%;border-collapse:collapse">' +
        '<thead><tr style="font-size:11px;color:var(--text-muted);background:var(--bg)">' +
          '<th style="padding:4px 8px">#</th><th style="padding:4px 8px">Nama</th>' +
          '<th style="padding:4px 8px">Email</th><th style="padding:4px 8px">Roles</th><th></th>' +
        '</tr></thead><tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>';
}

async function saveBulkUsers() {
  var items = _parseBulkUserLines();
  if (!items.length) return toast('Tidak ada data untuk diimport.', 'error');
  var btn     = document.getElementById('bulk-user-save-btn');
  var restore = btnLoading(btn, 'Mengimport...', 'bulk-user-modal');
  try {
    var result = await api('BATCH_CREATE_USERS', { items: items });
    clearCache('GET_USERS');
    var msg = result.created + ' user berhasil ditambahkan.';
    if (result.skipped && result.skipped.length) {
      msg += ' ' + result.skipped.length + ' gagal: ' + result.skipped.map(function(s) { return s.email + ' (' + s.reason + ')'; }).join(', ');
    }
    toast(msg, result.created > 0 ? 'success' : 'error');
    closeModal('bulk-user-modal');
    loadAdminUsers(document.getElementById('admin-tab-content'));
  } catch(err) { toast(err.message, 'error'); restore(); }
}

function _showSkipReport(previewId, skipped, keyField) {
  var el = document.getElementById(previewId);
  if (!el) return;
  var rows = skipped.map(function(s) {
    return '<tr style="font-size:12px">' +
      '<td style="padding:4px 8px;color:var(--text-muted)">' + escHtml(s[keyField]) + '</td>' +
      '<td style="padding:4px 8px;color:var(--rose)">' + escHtml(s.reason) + '</td>' +
    '</tr>';
  }).join('');
  el.innerHTML =
    '<div style="font-size:12px;font-weight:600;margin-bottom:6px;color:var(--rose)">' +
      skipped.length + ' baris dilewati:' +
    '</div>' +
    '<div style="overflow-x:auto;max-height:160px;overflow-y:auto">' +
      '<table style="width:100%;border-collapse:collapse">' +
        '<thead><tr style="font-size:11px;color:var(--text-muted);background:var(--bg)">' +
          '<th style="padding:4px 8px">' + keyField + '</th>' +
          '<th style="padding:4px 8px">Alasan</th>' +
        '</tr></thead><tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
    '<div style="margin-top:10px;font-size:12px;color:var(--text-muted)">' +
      'Perbaiki baris di atas lalu klik <strong>Import Semua</strong> lagi. ' +
      'Baris yang sudah berhasil <strong>tidak</strong> akan diduplikasi.' +
    '</div>';
}

// ── Checkbox helpers: Users ───────────────────────────────────

function _attachUserCheckboxListeners() {
  document.querySelectorAll('.user-chk').forEach(function(chk) {
    chk.addEventListener('change', _updateUserDeleteBtn);
  });
}

function toggleUserDeleteMode() {
  var col = document.getElementById('user-chk-col');
  if (!col) return;
  var active = col.style.display === 'none';
  col.style.display = active ? '' : 'none';
  document.querySelectorAll('.user-chk-cell').forEach(function(td) { td.style.display = active ? '' : 'none'; });
  var btn = document.getElementById('user-aksi-btn');
  if (btn) btn.style.color = active ? 'var(--rose)' : '';
  if (!active) {
    document.querySelectorAll('.user-chk').forEach(function(c) { c.checked = false; });
    var all = document.getElementById('user-chk-all');
    if (all) { all.checked = false; all.indeterminate = false; }
    _updateUserDeleteBtn();
  }
}

function toggleAreaDeleteMode() {
  var col = document.getElementById('area-chk-col');
  if (!col) return;
  var active = col.style.display === 'none';
  col.style.display = active ? '' : 'none';
  document.querySelectorAll('.area-chk-cell').forEach(function(td) { td.style.display = active ? '' : 'none'; });
  var btn = document.getElementById('area-aksi-btn');
  if (btn) btn.style.color = active ? 'var(--rose)' : '';
  if (!active) {
    document.querySelectorAll('.area-chk').forEach(function(c) { c.checked = false; });
    var all = document.getElementById('area-chk-all');
    if (all) { all.checked = false; all.indeterminate = false; }
    _updateAreaDeleteBtn();
  }
}

function toggleAllUserCheckboxes(masterChk) {
  document.querySelectorAll('.user-chk').forEach(function(chk) { chk.checked = masterChk.checked; });
  _updateUserDeleteBtn();
}

function _updateUserDeleteBtn() {
  var checked = document.querySelectorAll('.user-chk:checked').length;
  var btn     = document.getElementById('user-delete-selected-btn');
  var count   = document.getElementById('user-selected-count');
  if (btn)   btn.style.display   = checked > 0 ? '' : 'none';
  if (count) count.textContent   = checked;
  var all = document.getElementById('user-chk-all');
  if (all) all.indeterminate = checked > 0 && checked < document.querySelectorAll('.user-chk').length;
}

async function batchDeleteSelectedUsers() {
  var emails = Array.from(document.querySelectorAll('.user-chk:checked')).map(function(c) { return c.value; });
  if (!emails.length) return;
  var ok = await showConfirm({
    title: 'Hapus ' + emails.length + ' User',
    message: 'Hapus ' + emails.length + ' user sekaligus?',
    detail: 'Tindakan ini permanen. Data sessions dan findings tidak ikut terhapus.',
    confirmText: 'Hapus Semua',
    danger: true,
  });
  if (!ok) return;
  var btn     = document.getElementById('user-delete-selected-btn');
  var restore = btnLoading(btn, 'Menghapus...', 'admin-tab-content');
  try {
    var result = await api('BATCH_DELETE_USERS', { emails: emails });
    clearCache('GET_USERS');
    var msg = result.deleted + ' user berhasil dihapus.';
    if (result.skipped && result.skipped.length) msg += ' ' + result.skipped.length + ' gagal.';
    toast(msg, result.deleted > 0 ? 'success' : 'error');
    loadAdminUsers(document.getElementById('admin-tab-content'));
  } catch(err) { toast(err.message, 'error'); restore(); }
}
