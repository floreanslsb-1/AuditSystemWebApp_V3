<script>
// ============================================================
//  AUDIT DRAFT STATE  (localStorage-backed)
// ============================================================

function _draftKey(agendaId) { return 'audit_draft_' + agendaId; }

function _initAuditDraft(agendaId, periodId) {
  var saved = null;
  try {
    var raw = localStorage.getItem(_draftKey(agendaId));
    if (raw) saved = JSON.parse(raw);
  } catch(e) { console.warn('localStorage read gagal:', e.message); }

  var hasItems = saved && Object.keys(saved.items || {}).length > 0;
  var isValidDraft = saved
    && saved.agendaId === agendaId
    && saved.periodId === periodId
    && saved.activeGroupKey !== undefined
    && (hasItems || saved.activeGroupKey === null);

  if (isValidDraft) {
    window._auditDraft = saved;

    // BUG 2 FIX: kalau ada activeGroupKey tersisa dari sesi sebelumnya,
    // verifikasi dulu ke server. Kalau server tidak mengenal lock itu,
    // bersihkan supaya tidak jadi "lock hantu".
    if (saved.activeGroupKey !== null) {
      var nomor = null;
      // Ekstrak nomor dari items draft (lebih andal dari parse string key)
      var draftItemKeys = Object.keys(saved.items || {});
      if (draftItemKeys.length > 0) {
        var firstItem = saved.items[draftItemKeys[0]];
        if (firstItem && firstItem.nomor_persyaratan) {
          nomor = Number(firstItem.nomor_persyaratan);
        }
      }

      if (nomor) {
        // Verifikasi async — tidak blokir render, tapi bersihkan kalau invalid
        api('GET_LOCKS', { period_id: periodId, agenda_id: agendaId })
          .then(function(locks) {
            var myEmail = App.profile && App.profile.email;
            var serverHasMyLock = (locks || []).some(function(l) {
              return Number(l.nomor_persyaratan) === nomor
                && l.locked_by === myEmail
                && l.status === 'LOCKED';
            });
            if (!serverHasMyLock) {
              // Lock tidak ada di server — bersihkan draft hantu
              console.warn('[AuditDraft] Lock hantu terdeteksi untuk nomor=' + nomor + ', membersihkan.');
              if (window._auditDraft && window._auditDraft.agendaId === agendaId) {
                window._auditDraft.activeGroupKey = null;
                window._auditDraft.items = {};
                _persistAuditDraft();
                _renderFloatingSaveBar(agendaId, periodId);
                delete window._auditLockState[saved.activeGroupKey];
                _patchLockBadgesInDOM();
              }
            }
          })
          .catch(function(e) {
            // Kalau gagal verifikasi, amankan dengan bersihkan draft
            console.warn('[AuditDraft] Gagal verifikasi lock, bersihkan draft:', e.message);
            if (window._auditDraft && window._auditDraft.agendaId === agendaId) {
              window._auditDraft.activeGroupKey = null;
              window._auditDraft.items = {};
              _persistAuditDraft();
            }
          });
      } else {
        // Tidak bisa dapat nomor — langsung bersihkan activeGroupKey
        window._auditDraft.activeGroupKey = null;
        _persistAuditDraft();
      }
    }
  } else {
    window._auditDraft = { agendaId: agendaId, periodId: periodId, activeGroupKey: null, items: {} };
  }
  return window._auditDraft;
}

function _persistAuditDraft() {
  if (!window._auditDraft) return;
  try { localStorage.setItem(_draftKey(window._auditDraft.agendaId), JSON.stringify(window._auditDraft)); }
  catch(e) { console.warn('localStorage write gagal:', e.message); }
}

function _clearAuditDraft(agendaId) {
  try { localStorage.removeItem(_draftKey(agendaId)); } catch(e) {}
  if (window._auditDraft && window._auditDraft.agendaId === agendaId) {
    window._auditDraft.activeGroupKey = null;
    window._auditDraft.items = {};
  }
}

// ── Draft item helpers ─────────────────────────────────────────────
// Key format: "<groupKey>:<result_id>" — result_id adalah primary key unik per check item

function _draftItemKey(groupKey, resultId) {
  return groupKey + ':' + resultId;
}

function _draftSetItem(groupKey, resultId, fields) {
  if (!window._auditDraft) return;
  var key = _draftItemKey(groupKey, resultId);
  window._auditDraft.items[key] = Object.assign({}, window._auditDraft.items[key] || {}, fields);
  _persistAuditDraft();
}

function _draftGetItem(groupKey, resultId) {
  if (!window._auditDraft) return null;
  return window._auditDraft.items[_draftItemKey(groupKey, resultId)] || null;
}

function _draftHasChanges() {
  return !!(window._auditDraft &&
    window._auditDraft.activeGroupKey !== null &&
    Object.keys(window._auditDraft.items).length > 0);
}

function _draftSetActiveGroup(groupKey) {
  if (!window._auditDraft) return;
  window._auditDraft.activeGroupKey = groupKey;
  _persistAuditDraft();
}

// ── Build a stable, unique key for each persyaratan group ────────────
// Uses the group's aspek+persyaratan text so it's independent of nomor values.
// (Definisi lengkap ada di blok Lock Manager di bawah)

// ── beforeunload guard ──────────────────────────────────────────────

function _attachAuditUnloadGuard() {
  if (window._auditUnloadGuardAttached) return;
  window._auditUnloadGuardAttached = true;
  window.addEventListener('beforeunload', _auditUnloadHandler);
}
function _detachAuditUnloadGuard() {
  window.removeEventListener('beforeunload', _auditUnloadHandler);
  window._auditUnloadGuardAttached = false;
}
function _auditUnloadHandler(e) {
  if (_draftHasChanges()) { e.preventDefault(); e.returnValue = ''; return ''; }
}

// ============================================================
//  LOCK MANAGER
//  Lock granularity is at the persyaratan group level, identified
//  by groupKey (aspek||persyaratan text), NOT by nomor alone.
//  This fixes the cross-group collision bug.
// ============================================================

var LOCK_POLL_MS = 60000;
var _lockPollTimer = null;

// In-memory lock state: { "<groupKey>": { locked_by, status, nomor_persyaratan } }
window._auditLockState = window._auditLockState || {};

function _startLockPolling(agendaId, periodId) {
  _stopLockPolling();
  _lockPollTimer = setInterval(function() {
    if (document.visibilityState === 'hidden') return;
    _refreshLocks(agendaId, periodId);
  }, LOCK_POLL_MS);
}
function _stopLockPolling() {
  if (_lockPollTimer) { clearInterval(_lockPollTimer); _lockPollTimer = null; }
}

async function _refreshLocks(agendaId, periodId) {
  try {
    var locks = await api('GET_LOCKS', { period_id: periodId, agenda_id: agendaId });

    // BUG 4 FIX: sebelum rebuild, simpan dulu lock yang sedang dipegang sendiri
    // supaya tidak hilang saat proses save sedang berlangsung
    var draft = window._auditDraft;
    var myActiveGKey  = draft && draft.activeGroupKey;
    var myActiveLock  = myActiveGKey ? window._auditLockState[myActiveGKey] : null;

    // Rebuild dari server
    window._auditLockState = {};
    locks.forEach(function(l) {
      if (l.status === 'LOCKED') {
        var gKey = _groupKeyFromNomor(l.nomor_persyaratan);
        if (gKey) window._auditLockState[gKey] = l;
      }
    });

    // Pulihkan lock milik sendiri kalau tidak ada di server response
    // (bisa terjadi saat sedang di tengah proses save)
    if (myActiveGKey && myActiveLock && !window._auditLockState[myActiveGKey]) {
      window._auditLockState[myActiveGKey] = myActiveLock;
    }

    _patchLockBadgesInDOM();
  } catch(e) { /* silent — gagal poll tidak critical */ }
}

function _groupKey(g) {
  // Sertakan agenda_id agar key unik antar-agenda/area yang berbeda.
  var agendaId = (window._auditRenderCtx && window._auditRenderCtx.agenda)
    ? window._auditRenderCtx.agenda.agenda_id
    : '';
  return agendaId + '||' + g.aspek + '||' + g.persyaratan;
}

function _nomorFromGroupKey(gKey) {
  if (!window._auditRenderCtx) return null;
  var g = window._auditRenderCtx.groups.find(function(g) { return _groupKey(g) === gKey; });
  return g && g.items[0] ? Number(g.items[0].nomor) : null;
}

function _groupKeyFromNomor(nomor) {
  if (!window._auditRenderCtx) return null;
  var g = window._auditRenderCtx.groups.find(function(g) {
    return g.items.some(function(i) { return Number(i.nomor) === Number(nomor); });
  });
  return g ? _groupKey(g) : null;
}

function _patchLockBadgesInDOM() {
  document.querySelectorAll('[data-req-group]').forEach(function(el) {
    var gKey = el.getAttribute('data-req-group');
    var lock = window._auditLockState[gKey];
    var lockedByOther = lock && lock.locked_by !== App.profile.email;

    var badge = el.querySelector('.lock-badge-slot');
    if (badge) {
      badge.innerHTML = lockedByOther
        ? '<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted);font-weight:500">' +
            '<i data-lucide="lock" style="width:11px;height:11px"></i>' +
            escHtml(lock.locked_by.split('@')[0]) +
          '</span>'
        : '';
      if (lockedByOther) lucide.createIcons(badge);
    }
    el.querySelectorAll('.ci-action-btns button').forEach(function(btn) {
      btn.disabled = !!lockedByOther;
      btn.style.opacity = lockedByOther ? '0.35' : '';
      btn.style.pointerEvents = lockedByOther ? 'none' : '';
    });
  });
}

async function _acquireLock(agendaId, periodId, nomor) {
  try {
    var res = await api('LOCK_REQUIREMENT', { period_id: periodId, agenda_id: agendaId, nomor_persyaratan: nomor });
    if (res && res.locked === true) return { ok: true };
    return { ok: false, lockedBy: (res && res.lockedBy) || '?' };
  } catch(err) {
    toast('Gagal mengunci persyaratan: ' + err.message, 'error');
    return { ok: false, error: err.message };
  }
}

async function _ensureLockForGroup(agendaId, periodId, groupKey, nomor) {
  var draft = window._auditDraft;

  // Already holding lock for THIS group → allow freely
  if (draft && draft.activeGroupKey === groupKey) return true;

  // Holding lock for a DIFFERENT group → block
  if (draft && draft.activeGroupKey !== null && draft.activeGroupKey !== groupKey) {
    var activeGroup = window._auditRenderCtx && window._auditRenderCtx.groups.find(function(g) {
      return _groupKey(g) === draft.activeGroupKey;
    });
    var activeLabel = activeGroup && activeGroup.persyaratan ? escHtml(activeGroup.persyaratan.substring(0, 40)) : draft.activeGroupKey;
    toast('Selesaikan "' + activeLabel + '..." dulu (Save atau Buang) sebelum mengerjakan persyaratan lain.', 'warning', 6000);
    return false;
  }

  // Check in-memory lock from server — is someone else holding it?
  var existingLock = window._auditLockState[groupKey];
  if (existingLock && existingLock.locked_by !== App.profile.email) {
    toast('Persyaratan ini sedang dikerjakan ' + existingLock.locked_by.split('@')[0] + '.', 'warning', 6000);
    return false;
  }

  // Optimistically claim the lock locally
  _draftSetActiveGroup(groupKey);
  window._auditLockState[groupKey] = { locked_by: App.profile.email, status: 'LOCKED', nomor_persyaratan: nomor };

  // Confirm with server in background
  _acquireLock(agendaId, periodId, nomor).then(function(result) {
    if (!result.ok) {
      if (window._auditDraft && window._auditDraft.activeGroupKey === groupKey) {
        window._auditDraft.activeGroupKey = null;
        _persistAuditDraft();
      }
      delete window._auditLockState[groupKey];
      if (result.lockedBy) {
        toast('Persyaratan ini sedang dikerjakan ' + result.lockedBy.split('@')[0] + '. Isian dibatalkan.', 'warning', 6000);
      }
      _repaintGroupItems(groupKey);
    }
  });

  return true;
}

// ============================================================
//  Page_Audit — entry point
// ============================================================

Pages['audit'] = async function(container, params) {
  _stopLockPolling();
  if (!App.profile?.isAuditor) {
    container.innerHTML = _emptyState('lock', 'Hanya untuk Auditor', 'Anda tidak ditugaskan sebagai auditor di periode ini.');
    lucide.createIcons(); return;
  }
  var period = App.activePeriod;
  if (!period) {
    container.innerHTML = _emptyState('calendar-off', 'Tidak Ada Periode', 'Belum ada periode audit.');
    lucide.createIcons(); return;
  }
  if (period.status !== 'ACTIVE') {
    container.innerHTML = _emptyState('clock', 'Periode Belum Aktif',
      'Periode <strong>' + escHtml(period.nama_periode) + '</strong> berstatus ' + period.status + '. Hubungi Koordinator untuk mengaktifkan.');
    lucide.createIcons(); return;
  }

  var [agendas, areas] = await Promise.all([
    cachedApi('GET_AGENDAS_BY_PERIOD', { period_id: period.period_id }, 60),
    cachedApi('GET_AREAS',             {},                              60),
  ]);

  var myAgendas = agendas.filter(function(a) { return _emailInCsv(a.auditor_emails, App.profile.email); });
  if (!myAgendas.length) {
    container.innerHTML = _emptyState('clipboard-x', 'Belum Ada Assignment', 'Koordinator belum assign area untuk Anda di periode ini.');
    lucide.createIcons(); return;
  }

  var cardsHtml = myAgendas.map(function(ag) {
    var area    = areas.find(function(a) { return a.area_id === ag.area_id; });
    var dept    = escHtml(area ? area.dept : ag.area_id);
    var kat     = escHtml(area ? area.kategori : '');
    var statusInfo, actionLabel, actionIcon;
    if (ag.status === 'PLANNED') {
      statusInfo = '<span class="badge badge-slate">Belum dimulai</span>';
      actionLabel = 'Mulai Audit'; actionIcon = 'play';
    } else if (ag.status === 'STARTED') {
      statusInfo = statusBadge(ag.status);
      actionLabel = 'Lanjutkan Audit'; actionIcon = 'arrow-right';
    } else {
      statusInfo = statusBadge(ag.status);
      actionLabel = 'Lihat Hasil'; actionIcon = 'eye';
    }
    var auditorChips = (ag.auditor_emails || '').split(',').map(function(e) { return e.trim(); }).filter(Boolean)
      .map(function(e) {
        return '<span class="file-chip" style="margin:2px"><i data-lucide="user" style="width:10px;height:10px"></i>' + escHtml(e.split('@')[0]) + '</span>';
      }).join('');
    var samplingText = area && area.area_sampling ? area.area_sampling : '';
    return '<div class="card" style="overflow:hidden"><div class="card-body">' +
      '<div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:14px">' +
        '<div style="width:40px;height:40px;border-radius:10px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0">' +
          '<i data-lucide="building-2" style="width:18px;height:18px;color:var(--blue)"></i></div>' +
        '<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:700">' + dept + '</span>' +
          (kat ? '<span class="badge badge-blue" style="font-size:10px">' + kat + '</span>' : '') + '</div></div>' +
        '<div style="flex-shrink:0">' + statusInfo + '</div>' +
      '</div>' +
      '<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:4px">TIM AUDITOR</div>' +
        '<div>' + (auditorChips || '<span style="font-size:12px;color:var(--text-muted)">—</span>') + '</div></div>' +
      (samplingText ? '<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:4px">AREA SAMPLING</div>' +
        '<div style="font-size:12px;color:var(--text-muted)">' + escHtml(samplingText) + '</div></div>' : '<div style="margin-bottom:14px"></div>') +
      '<button class="btn btn-primary w-full" onclick="' +
        (ag.status !== 'PLANNED' ? 'selectAuditArea(\'' + ag.area_id + '\',\'' + period.period_id + '\')' :
          '_confirmStartAudit(\'' + ag.area_id + '\',\'' + period.period_id + '\',\'' + escHtml(dept) + '\')') + '">' +
        '<i data-lucide="' + actionIcon + '" style="width:14px;height:14px"></i> ' + actionLabel +
      '</button></div></div>';
  }).join('');

  container.innerHTML =
    '<div class="page-hero mb-24"><h1 style="display:flex;align-items:center;gap:10px">' +
      '<i data-lucide="clipboard-list" style="width:24px;height:24px"></i> Form Audit</h1>' +
      '<p>Periode: <strong style="color:#fff">' + escHtml(period.nama_periode) + '</strong> · ' + myAgendas.length + ' area ditugaskan</p></div>' +
    '<div id="audit-card-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">' + cardsHtml + '</div>' +
    '<div id="audit-checklist-panel"></div>';
  lucide.createIcons();
};

function _emptyState(icon, title, desc) {
  return '<div class="empty-state"><i data-lucide="' + icon + '" style="width:48px;height:48px;opacity:.3;margin-bottom:16px"></i>' +
    '<div class="empty-title">' + title + '</div><div class="empty-desc">' + desc + '</div></div>';
}

// ============================================================
//  selectAuditArea
// ============================================================

async function selectAuditArea(areaId, periodId) {
  window._auditActiveAreaId = areaId;
  var grid  = document.getElementById('audit-card-grid');
  var panel = document.getElementById('audit-checklist-panel');
  if (grid)  grid.style.display = 'none';
  panel.innerHTML = _skeletonChecklist();
  try {
    var [agendas, areas] = await Promise.all([
      cachedApi('GET_AGENDAS_BY_PERIOD', { period_id: periodId }, 30),
      cachedApi('GET_AREAS',             {},                       60),
    ]);
    var agenda = agendas.find(function(a) { return a.area_id === areaId; });
    if (!agenda) { _backToAuditAreas(); return; }
    _initAuditDraft(agenda.agenda_id, periodId);
    _attachAuditUnloadGuard();

    // BUG 5 FIX: Reset lock state saat pindah area.
    window._auditLockState = {};

    await renderAuditChecklist(panel, agenda, areaId, periodId);
    _startLockPolling(agenda.agenda_id, periodId);
  } catch(err) {
    panel.innerHTML = _emptyState('alert-triangle', 'Error', escHtml(err.message));
    lucide.createIcons();
  }
}

function _skeletonChecklist() {
  var rows = '';
  for (var i = 0; i < 4; i++) {
    rows += '<div style="background:var(--surface,#fff);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px">' +
      '<div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center">' +
        '<div class="skeleton" style="width:52px;height:18px;border-radius:4px"></div>' +
        '<div class="skeleton" style="width:64px;height:18px;border-radius:4px"></div>' +
        '<div class="skeleton" style="flex:1;height:15px;border-radius:4px"></div>' +
      '</div>' +
      '<div style="padding:12px 16px;display:flex;flex-direction:column;gap:8px">' +
        '<div class="skeleton" style="width:75%;height:13px;border-radius:4px"></div>' +
        '<div class="skeleton" style="width:55%;height:11px;border-radius:4px;opacity:.6"></div>' +
      '</div></div>';
  }
  return '<div style="margin-bottom:16px"><button class="btn btn-ghost btn-sm" onclick="_backToAuditAreas()">' +
    '<i data-lucide="arrow-left" style="width:14px;height:14px"></i> Daftar Area</button></div>' + rows;
}

function _backToAuditAreas() {
  _stopLockPolling();
  _detachAuditUnloadGuard();

  // BUG 5 FIX: Bersihkan lock state saat keluar dari area
  window._auditLockState = {};
  // Reset renderCtx agar _groupKey tidak menggunakan session lama
  window._auditRenderCtx = null;

  var grid = document.getElementById('audit-card-grid');
  if (grid) grid.style.display = 'grid';
  var panel = document.getElementById('audit-checklist-panel');
  if (panel) panel.innerHTML = '';
}

async function _confirmStartAudit(areaId, periodId, dept) {
  var ok = await showConfirm({ title: 'Mulai Audit', message: 'Mulai audit untuk ' + dept + '?', detail: 'Audit akan segera dimulai.', confirmText: 'Mulai Audit' });
  if (!ok) return;
  var agendas = await cachedApi('GET_AGENDAS_BY_PERIOD', { period_id: periodId }, 30);
  var agenda  = agendas.find(function(a) { return a.area_id === areaId; });
  if (!agenda) return toast('Agenda tidak ditemukan.', 'error');
  await startAudit(areaId, periodId, agenda.agenda_id);
}

async function startAudit(areaId, periodId, agendaId) {
  var panel = document.getElementById('audit-checklist-panel');
  var grid  = document.getElementById('audit-card-grid');
  if (grid)  grid.style.display = 'none';
  if (panel) panel.innerHTML = _skeletonChecklist();
  try {
    await api('START_AUDIT', { area_id: areaId, period_id: periodId, agenda_id: agendaId });
    clearCache('GET_AGENDAS_BY_PERIOD');
    clearCache('GET_DASHBOARD');
    toast('Audit dimulai!', 'success');
    selectAuditArea(areaId, periodId);
  } catch(err) {
    toast(err.message, 'error');
    if (grid)  grid.style.display = 'grid';
    if (panel) panel.innerHTML = '';
  }
}

// ============================================================
//  renderAuditChecklist
// ============================================================

window._auditRenderCtx = null;

async function renderAuditChecklist(panel, agenda, areaId, periodId) {
  var [locks, findings, savedResults] = await Promise.all([
    api('GET_LOCKS',              { period_id: periodId, agenda_id: agenda.agenda_id }),
    api('GET_FINDINGS_BY_AGENDA', { period_id: periodId, agenda_id: agenda.agenda_id }),
    api('GET_AUDIT_RESULTS',      { period_id: periodId, agenda_id: agenda.agenda_id }),
  ]);

  var groups = _buildGroupsFromResults(savedResults);

  // Seed lock state using groupKey
  window._auditLockState = {};
  locks.filter(function(l) { return l.status === 'LOCKED'; }).forEach(function(l) {
    var g = groups.find(function(g) { return g.items.some(function(i) { return Number(i.nomor) === Number(l.nomor_persyaratan); }); });
    if (g) window._auditLockState[_groupKey(g)] = l;
  });

  var resultMap = {};
  savedResults.forEach(function(r) { resultMap[r.result_id] = r.status; });

  var findingMap = {};
  findings.forEach(function(f) { findingMap[f.result_id] = f; });

  var isLocked = agenda.status !== 'STARTED';

  window._auditRenderCtx = { agenda: agenda, areaId: areaId, periodId: periodId, isLocked: isLocked, resultMap: resultMap, findingMap: findingMap, groups: groups };

  var draft = window._auditDraft || { activeGroupKey: null, items: {} };

  var totalItems = savedResults.length, doneItems = 0, nonComply = 0;
  groups.forEach(function(g) {
    g.items.forEach(function(item, idx) {
      var m = _mergedStatus(_groupKey(g), item.nomor, idx + 1, resultMap, item.result_id);
      if (m.status) doneItems++;
      if (m.status === 'NON_COMPLY') nonComply++;
    });
  });
  var progressPct = totalItems > 0 ? Math.round(doneItems / totalItems * 100) : 0;

  var finishBtn = agenda.status === 'STARTED'
    ? '<button class="btn btn-success btn-sm" id="finish-btn" onclick="singleClick(this,function(){ finishAudit(\'' + agenda.agenda_id + '\',\'' + periodId + '\') })">' +
        '<i data-lucide="check-circle" style="width:13px;height:13px"></i> Selesai & Minta Persetujuan</button>'
    : '';

  var groupsHtml = groups.map(function(g) {
    return _renderGroup(g, agenda, periodId, resultMap, findingMap, isLocked, draft.activeGroupKey);
  }).join('');

  panel.innerHTML =
    '<div style="margin-bottom:16px"><button class="btn btn-ghost btn-sm" onclick="_backToAuditAreas()">' +

// ── Group builder ──────────────────────────────────────────────────

function _buildGroups(checklist) {
  var groups = [], groupMap = {};
  checklist.forEach(function(item) {
    var key = item.aspek + '||' + item.persyaratan;
    if (!groupMap[key]) {
      groupMap[key] = { aspek: item.aspek, persyaratan: item.persyaratan, items: [] };
      groups.push(groupMap[key]);
    }
    groupMap[key].items.push(item);
  });
  groups.forEach(function(g) {
    g.items.sort(function(a, b) { return Number(a.nomor) - Number(b.nomor); });
    g.firstNomor = g.items[0] ? Number(g.items[0].nomor) : 0;
    g.tipe = g.items[0] ? g.items[0].tipe : '';
  });
  groups.sort(function(a, b) {
    if (a.tipe !== b.tipe) return a.tipe === 'GENERAL' ? -1 : 1;
    return a.firstNomor - b.firstNomor;
  });
  return groups;
}

// ── Build groups dari AUDIT_RESULTS pre-populated ──────────────────

function _buildGroupsFromResults(results) {
  var groupMap   = {};
  var groupOrder = [];
  results.forEach(function(r) {
    var key = r.aspek + '||' + r.persyaratan;
    if (!groupMap[key]) {
      groupMap[key] = {
        aspek:       r.aspek,
        persyaratan: r.persyaratan,
        firstNomor:  Number(r.nomor_persyaratan),
        tipe:        r.tipe,
        items:       [],
      };
      groupOrder.push(key);
    }
    groupMap[key].items.push({
      id:                 r.result_id,
      item_id:            r.item_id,
      result_id:          r.result_id,
      nomor:              r.nomor_persyaratan,
      check_item_no:      r.check_item_no,
      check_item:         r.check_item,
      standar_check_item: r.standar_check_item,
      aspek:              r.aspek,
      persyaratan:        r.persyaratan,
      tipe:               r.tipe,
      kategori:           r.kategori,
    });
  });
  groupOrder.sort(function(a, b) {
    var ga = groupMap[a], gb = groupMap[b];
    if (ga.tipe !== gb.tipe) return ga.tipe === 'GENERAL' ? -1 : 1;
    return ga.firstNomor - gb.firstNomor;
  });
  return groupOrder.map(function(k) { return groupMap[k]; });
}

// ── Merged status ──────────────────────────────────────────────────

function _mergedStatus(groupKey, nomor, ciNo, resultMap, resultId) {
  var _rmap     = resultMap || (window._auditRenderCtx && window._auditRenderCtx.resultMap);
  var srvStatus = (_rmap && resultId) ? _rmap[resultId] : undefined;
  var draftKey  = _draftItemKey(groupKey, resultId);
  var drfItem   = window._auditDraft ? window._auditDraft.items[draftKey] : null;
  if (drfItem && drfItem.status) {
    return {
      status: drfItem.status, fromDraft: true,
      deskripsi: drfItem.deskripsi_temuan || '',
      fileCount: (window._auditPendingFiles && window._auditPendingFiles[draftKey])
        ? window._auditPendingFiles[draftKey].length : 0,
    };
  }
  return { status: srvStatus, fromDraft: false, deskripsi: '', fileCount: 0 };
}

// ============================================================

        '<i data-lucide="chevron-down" style="width:14px;height:14px"></i>' +

      '</div>' +
      // Right: editing indicator + lock + count

        editingIndicator +

// ── Render one check-item row — buttons on the right ──────────────────

  // FIX 2: layout — item text left, buttons right (flex row)

// Helper: escape for HTML attributes
function escAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Lightbox sederhana
function _openFotoLightbox(url) {
  var existing = document.getElementById('foto-lightbox');
  if (existing) existing.remove();
  var lb = document.createElement('div');
  lb.id = 'foto-lightbox';
  lb.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);' +
    'display:flex;align-items:center;justify-content:center;cursor:zoom-out;padding:16px';
  lb.onclick = function() { lb.remove(); };

  // Pakai base64 dari cache kalau ada, atau load via server
  var cachedSrc = _driveImgCache[url] || '';
  lb.innerHTML =
    '<div style="position:relative;max-width:90vw;max-height:90vh;display:flex;align-items:center;justify-content:center">' +
      '<div id="lb-spinner" style="' + (cachedSrc ? 'display:none' : '') + 'color:#fff;font-size:13px;padding:32px">Memuat gambar...</div>' +
      '<img id="lb-img" src="' + escHtml(cachedSrc) + '" ' +

        'onerror="this.style.display=\'none\';document.getElementById(\'lb-err\').style.display=\'block\'">' +
      '<div id="lb-err" style="display:none;color:#fff;text-align:center;padding:32px">' +
        'Tidak bisa memuat gambar.<br>' +
        '<a href="' + escHtml(url) + '" target="_blank" style="color:#60a5fa">Buka di tab baru</a>' +
      '</div>' +
      '<a href="' + escHtml(url) + '" target="_blank" onclick="event.stopPropagation()" ' +
        'style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border-radius:6px;' +
          'padding:6px 10px;color:#fff;text-decoration:none;font-size:12px;display:flex;align-items:center;gap:4px">' +
        '<i data-lucide="external-link" style="width:13px;height:13px"></i>Buka tab baru' +
      '</a>' +
    '</div>';
  document.body.appendChild(lb);
  lucide.createIcons(lb);

  // Kalau belum di-cache, load via server sekarang
  if (!cachedSrc) {
    var imgEl = lb.querySelector('#lb-img');
    var spinner = lb.querySelector('#lb-spinner');
    api('GET_DRIVE_IMAGE_BASE64', { url: url }).then(function(dataUri) {
      if (!dataUri) { if (spinner) spinner.style.display = 'none'; document.getElementById('lb-err') && (document.getElementById('lb-err').style.display = 'block'); return; }
      _driveImgCache[url] = dataUri;
      if (imgEl) { imgEl.src = dataUri; imgEl.style.display = 'block'; }
      if (spinner) spinner.style.display = 'none';
    }).catch(function() {
      if (spinner) spinner.style.display = 'none';
      var errEl = lb.querySelector('#lb-err');
      if (errEl) errEl.style.display = 'block';
    });
  }
}

// Repaint entire group's items (e.g. after discard or lock rollback)
function _repaintGroupItems(gKey) {
  if (!window._auditRenderCtx) return;
  var ctx   = window._auditRenderCtx;
  var g     = ctx.groups.find(function(g) { return _groupKey(g) === gKey; });
  if (!g) return;
  var safeId  = 'rg-' + (g.items[0] ? Number(g.items[0].nomor) : 0) + '-' + g.items.length;
  var itemsEl = document.getElementById('rg-items-' + safeId);
  if (!itemsEl) return;
  var lock    = window._auditLockState[gKey];
  var gLocked = lock && lock.locked_by !== App.profile.email;
  itemsEl.innerHTML = g.items.map(function(item, idx) {
    return _renderCheckItem(gKey, item, idx + 1, ctx.agenda, ctx.periodId, ctx.resultMap, ctx.findingMap, ctx.isLocked, gLocked, false);
  }).join('');
  lucide.createIcons(itemsEl);
  _loadAllDriveImgs(itemsEl);
}

    groupEl.style.boxShadow = ownedByMe ? '0 0 0 2px var(--amber,#f59e0b)' : '';
  }

  _updateProgressBar();

function _updateProgressBar() {
  if (!window._auditRenderCtx) return;
  var ctx = window._auditRenderCtx;
  var totalItems = 0, doneItems = 0, nonComply = 0;
  ctx.groups.forEach(function(g) {
    var gKey = _groupKey(g);
    g.items.forEach(function(item, idx) {
      totalItems++;
      var m = _mergedStatus(gKey, item.nomor, idx + 1, ctx.resultMap, item.result_id);
      if (m.status) doneItems++;
      if (m.status === 'NON_COMPLY') nonComply++;
    });
  });
  var pct   = totalItems > 0 ? Math.round(doneItems / totalItems * 100) : 0;
  var bar   = document.getElementById('audit-progress-bar');
  var label = document.getElementById('audit-progress-label');
  if (bar) { bar.style.width = pct + '%'; bar.style.background = nonComply > 0 ? 'var(--rose,#f43f5e)' : 'var(--emerald,#10b981)'; }
  if (label) label.innerHTML = '<span>' + doneItems + ' dari ' + totalItems + ' check item selesai</span><span>' + nonComply + ' temuan</span>';
}

// Tidak ada perubahan di sini — pastikan ini sudah ada dan benar:
async function submitCheckItem(itemId, gKey, nomor, ciNo, status, agendaId, periodId, btn) {
  var locked = await _ensureLockForGroup(agendaId, periodId, gKey, nomor);
  if (!locked) return;

  var _srCtx = window._auditRenderCtx;
  var _srGrp = _srCtx && _srCtx.groups.find(function(g) { return _groupKey(g) === gKey; });
  var _srItm = _srGrp && _srGrp.items.find(function(i) {
    return Number(i.nomor) === Number(nomor) && Number(i.check_item_no) === Number(ciNo);
  });
  var resultId = (_srItm && _srItm.result_id) || '';

  _draftSetItem(gKey, resultId, {
    item_id:           itemId,
    result_id:         resultId,
    nomor_persyaratan: Number(nomor),
    check_item_no:     Number(ciNo),
    status:            status
  });
  _repaintCheckItemRow(gKey, resultId, status, true);
  _renderFloatingSaveBar(agendaId, periodId);

  if (status === 'NON_COMPLY') {
    _openDraftFindingForm(itemId, gKey, nomor, ciNo, resultId, agendaId, periodId);
  }
}

  var draft = window._auditDraft;
  if (!draft || draft.activeGroupKey === null) return;

  var prefix    = draft.activeGroupKey + ':';
  var draftKeys = Object.keys(draft.items).filter(function(k) { return k.indexOf(prefix) === 0; });
  if (!draftKeys.length) return;

  // Get short label for the active group
  var activeGroup = window._auditRenderCtx && window._auditRenderCtx.groups.find(function(g) { return _groupKey(g) === draft.activeGroupKey; });
  var groupLabel  = activeGroup ? activeGroup.persyaratan.substring(0, 30) + (activeGroup.persyaratan.length > 30 ? '…' : '') : 'Persyaratan';

    '</div>' +

      '<i data-lucide="x" style="width:13px;height:13px"></i>Buang' +

function _openDraftFindingForm(itemId, gKey, nomor, ciNo, resultId, agendaId, periodId) {
  var existing  = _draftGetItem(gKey, resultId) || {};
  var dKey      = _draftItemKey(gKey, resultId);
  // File pending in-memory (belum di-save ke server)
  var pendingFiles = (window._auditPendingFiles && window._auditPendingFiles[dKey]) || [];
  // File yang sudah tersimpan di server (foto_urls dari draft atau server finding)
  var savedUrls = [];
  if (!existing.foto_urls && window._auditRenderCtx && window._auditRenderCtx.findingMap) {
    var srvF = window._auditRenderCtx.findingMap[resultId];
    if (srvF && srvF.foto_urls) savedUrls = srvF.foto_urls.split(',').filter(Boolean);
  } else if (existing.foto_urls) {
    savedUrls = String(existing.foto_urls).split(',').filter(Boolean);
  }

  var savedHtml = _buildFotoGrid('ff', savedUrls.join(','), gKey, resultId, agendaId, periodId);

  createModal({
    id: 'finding-form-modal',
    title: 'Catat Temuan — Item #' + nomor + '.' + ciNo,
    body:
      '<div class="form-group">' +
        '<label class="form-label">Deskripsi Temuan <span class="required">*</span></label>' +
        '<textarea class="form-control" id="ff-deskripsi" rows="4" placeholder="Jelaskan kondisi yang ditemukan...">' +
          escHtml(existing.deskripsi_temuan || '') + '</textarea>' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label">Foto Bukti <span class="required">*</span>' +
          '<span id="ff-upload-hint" style="font-size:11px;color:var(--rose,#f43f5e);font-weight:400;margin-left:6px">' +
            (savedUrls.length || pendingFiles.length ? '' : '(wajib upload minimal 1 foto)') +
          '</span>' +
        '</label>' +
        savedHtml +
        '<div class="upload-zone" id="ff-upload-zone" style="min-height:72px">' +
          '<i data-lucide="camera" style="width:22px;height:22px;opacity:.3;margin-bottom:4px"></i>' +
          '<div class="upload-text" style="font-size:12px">Klik atau drag foto bukti temuan</div>' +
        '</div>' +
        '<div class="upload-previews" id="ff-upload-preview"></div>' +
      '</div>',
    footer:
      '<button class="btn btn-outline" onclick="closeModal(\'finding-form-modal\')">Batal</button>' +
      '<button class="btn btn-danger" id="ff-save-btn" onclick="singleClick(this,function(){ _saveDraftFinding(\'' + escAttr(gKey) + '\',' + nomor + ',' + ciNo + ') })">' +
        '<i data-lucide="triangle-alert" style="width:14px;height:14px"></i>Simpan ke Draf' +
      '</button>',
  });
  lucide.createIcons();

  // Setup upload zone — re-hydrate pending files dari memory
  var zone = setupUploadZone('ff-upload-zone', 'ff-upload-preview', function(files) {
    // Update hint text ketika file ditambah/hapus
    var hint = document.getElementById('ff-upload-hint');
    if (!hint) return;
    var savedCount = document.querySelectorAll('#ff-saved-files > div').length;
    hint.textContent = (files.length + savedCount) > 0 ? '' : '(wajib upload minimal 1 foto)';
  });

  var existingPending = (window._auditPendingFiles && window._auditPendingFiles[dKey]) || [];

  // FIX 2: pendingFiles yang ada di memory harus ikut dihitung sebagai "foto ada"
  // supaya validasi "minimal 1 foto" tidak salah
  window._ffExistingSavedUrls = savedUrls.slice();

  // Set files ke upload zone setelah modal render
  setTimeout(function() {
    var zoneEl = document.getElementById('ff-upload-zone');
    if (zoneEl && zoneEl._setFiles && existingPending.length) {
      zoneEl._setFiles(existingPending);
    }

    // FIX 2b: update hint dan savedCount agar validasi memperhitungkan pendingFiles
    var hint = document.getElementById('ff-upload-hint');
    if (hint) {
      var totalAda = savedUrls.length + existingPending.length;
      hint.textContent = totalAda > 0 ? '' : '(wajib upload minimal 1 foto)';
    }

    // FIX 2c: tampilkan preview pendingFiles di bawah upload zone sebagai informasi
    if (existingPending.length) {
      var previewEl = document.getElementById('ff-upload-preview');
      // _setFiles sudah trigger update() di setupUploadZone → preview otomatis tampil
    }
  }, 50);
}
async function _deleteSavedFoto(url, idx, gKey, resultId, agendaId, periodId, prefix) {
  prefix = prefix || 'ff';
  var ok = await showConfirm({
    title: 'Hapus Foto', message: 'Hapus foto bukti ini?',
    detail: 'File akan dihapus dari sistem.', confirmText: 'Hapus', danger: true,
  });
  if (!ok) return;

  try { await api('DELETE_DRIVE_FILE', { file_url: url }); }
  catch(e) { toast('Gagal hapus file: ' + e.message, 'error'); return; }

  // Update draft foto_urls — pakai resultId langsung
  var existing = _draftGetItem(gKey, resultId) || {};
  var urls = String(existing.foto_urls || '').split(',').filter(Boolean);
  urls = urls.filter(function(u) { return u !== url; });
  _draftSetItem(gKey, resultId, { foto_urls: urls.join(',') });

  // Update snapshot
  var snapKey = prefix === 'ff' ? '_ffExistingSavedUrls' : '_efExistingSavedUrls';
  if (window[snapKey]) window[snapKey] = window[snapKey].filter(function(u) { return u !== url; });

  // Update DOM
  var savedContainer = document.getElementById(prefix + '-saved-files');
  if (savedContainer) {
    var items = Array.from(savedContainer.querySelectorAll(':scope > div'));
    if (items[idx]) items[idx].remove();
    // Update hint
    var hint = document.getElementById(prefix + '-upload-hint');
    var zone = document.getElementById(prefix + '-upload-zone');
    if (hint && zone) {
      var pendingCount = zone._getFiles ? zone._getFiles().length : 0;
      var remaining    = savedContainer.querySelectorAll(':scope > div').length;
      hint.textContent = (remaining + pendingCount) > 0 ? '' : '(wajib upload minimal 1 foto)';
    }
  }
  // Update findingMap di renderCtx
  if (window._auditRenderCtx && window._auditRenderCtx.findingMap) {
    if (resultId && window._auditRenderCtx.findingMap[resultId]) {
      var _fm = window._auditRenderCtx.findingMap[resultId];
      _fm.foto_urls = (_fm.foto_urls || '').split(',').filter(Boolean)
        .filter(function(u) { return u !== url; }).join(',');
    }
  }
  toast('Foto dihapus.', 'success');
}

function _validateImageFiles(files) {
  var allowed = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
  for (var i = 0; i < files.length; i++) {
    if (!allowed.includes(files[i].type)) {
      toast('Hanya file gambar yang diizinkan (JPG, PNG, GIF, WebP). File "' + files[i].name + '" tidak valid.', 'error');
      return false;
    }
    if (files[i].size > 10 * 1024 * 1024) { // 10MB limit
      toast('Ukuran file maksimal 10MB. File "' + files[i].name + '" terlalu besar.', 'error');
      return false;
    }
  }
  return true;
}

async function _saveDraftFinding(gKey, nomor, ciNo) {
  var deskripsi = (document.getElementById('ff-deskripsi') || {}).value?.trim();
  if (!deskripsi) return toast('Deskripsi temuan wajib diisi.', 'error');

  var zone     = document.getElementById('ff-upload-zone');
  var newFiles = zone && zone._getFiles ? zone._getFiles() : [];
  if (newFiles.length && !_validateImageFiles(newFiles)) return;
  var savedCount = (window._ffExistingSavedUrls || []).length;

  // FIX 3: hitung juga pendingFiles yang sudah ada dari sesi sebelumnya
  // Skenario: user sudah upload foto di modal sebelumnya, buka modal lagi
  // tapi tidak upload lagi — foto lama masih ada di _auditPendingFiles
    var _sdCtx = window._auditRenderCtx;
  var _sdGrp = _sdCtx && _sdCtx.groups.find(function(g) { return _groupKey(g) === gKey; });
  var _sdItm = _sdGrp && _sdGrp.items.find(function(i) {

async function _saveEditedFinding(gKey, nomor, ciNo) {
  var deskripsi = (document.getElementById('ef-deskripsi') || {}).value?.trim();
  if (!deskripsi) return toast('Deskripsi temuan wajib diisi.', 'error');

  // Resolve resultId dari renderCtx — single source of truth
  var ctx = window._auditRenderCtx;
  var _seGrp2 = ctx && ctx.groups.find(function(g){ return _groupKey(g) === gKey; });
  var _seItm2 = _seGrp2 && _seGrp2.items.find(function(i){
    return Number(i.nomor) === Number(nomor) && Number(i.check_item_no) === Number(ciNo);
  });
  var resolvedResultId = (_seItm2 && _seItm2.result_id) || '';
  var resolvedItemId   = (_seItm2 && _seItm2.item_id)   || '';

  // Acquire lock sekarang (saat user benar-benar menyimpan, bukan saat pencil diklik)
  var agendaId = ctx && ctx.agenda && ctx.agenda.agenda_id;
  var periodId = ctx && ctx.periodId;
  if (agendaId && periodId) {
    var locked = await _ensureLockForGroup(agendaId, periodId, gKey, nomor);
    if (!locked) return;
  }

  var zone     = document.getElementById('ef-upload-zone');
  var newFiles = zone && zone._getFiles ? zone._getFiles() : [];
  var savedCount = (window._efExistingSavedUrls || []).length;

  if (!window._auditPendingFiles) window._auditPendingFiles = {};
  var dKey = _draftItemKey(gKey, resolvedResultId);

  // Hitung pending lama yang sudah ada sebelum modal ini dibuka
  var alreadyPendingEf = (window._auditPendingFiles[dKey] || []).length;

  // Validasi: minimal 1 foto dari salah satu sumber
  if (newFiles.length + savedCount + alreadyPendingEf < 1) {
    return toast('Upload minimal 1 foto bukti temuan.', 'error');
  }

  // Kalau ada file baru, replace pending lama. Kalau tidak ada, pertahankan lama.
  if (newFiles.length) {
    window._auditPendingFiles[dKey] = newFiles;
  }

  if (!resolvedResultId) {
    console.error('[saveEditedFinding] result_id tidak ditemukan untuk nomor=' + nomor + ' ciNo=' + ciNo);
  }

  _draftSetItem(gKey, resolvedResultId, {
    item_id:           resolvedItemId,
    result_id:         resolvedResultId,
    nomor_persyaratan: Number(nomor),
    check_item_no:     Number(ciNo),
    status:            'NON_COMPLY',
    deskripsi_temuan:  deskripsi,
  });

  _draftSetActiveGroup(gKey);

  toast('Temuan diperbarui dalam draf.', 'success');
  closeModal('edit-finding-modal');
  window._efExistingSavedUrls = null;
  _repaintCheckItemRow(gKey, resolvedResultId, 'NON_COMPLY', true);
  _renderFloatingSaveBar(agendaId, periodId);
}

// ============================================================
//  _saveRequirement  — batch save
// ============================================================

async function _saveRequirement(agendaId, periodId, btn) {
  var draft = window._auditDraft;
  if (!draft || draft.activeGroupKey === null) return toast('Tidak ada draf untuk disimpan.', 'warning');

  var gKey   = draft.activeGroupKey;
  var prefix = gKey + ':';

  var items = Object.keys(draft.items)
    .filter(function(k) { return k.indexOf(prefix) === 0; })
    .map(function(k) {
      var d = draft.items[k];
      // Ambil foto yang sudah tersimpan di server untuk result ini (agar tidak tertimpa)
      var srvFinding = (window._auditRenderCtx && window._auditRenderCtx.findingMap && d.result_id)
        ? window._auditRenderCtx.findingMap[d.result_id]
        : null;
      var existingFotoUrls = (d.foto_urls) || (srvFinding && srvFinding.foto_urls) || '';
      return {
        result_id:          d.result_id || '',
        nomor_persyaratan:  d.nomor_persyaratan,
        check_item_no:      d.check_item_no,
        status:             d.status === 'COMPLY' ? 'Comply' : d.status === 'NON_COMPLY' ? 'Non Comply' : d.status,
        deskripsi_temuan:   d.deskripsi_temuan || '',
        existing_foto_urls: existingFotoUrls,
      };
    });

  if (!items.length) return toast('Tidak ada item untuk disimpan.', 'warning');

  // FIX 5: validasi Non Comply harus cek deskripsi DAN foto
  // (foto bisa ada di pendingFiles meski foto_urls di draft kosong)
  var missing = items.filter(function(it) {
    if (it.status !== 'Non Comply') return false;
    if (!it.deskripsi_temuan) return true;  // tidak ada deskripsi

    // Cek apakah ada foto (pending atau saved)
    var dKey2 = _draftItemKey(gKey, it.result_id);
    var hasPending = !!(window._auditPendingFiles && window._auditPendingFiles[dKey2] &&
      window._auditPendingFiles[dKey2].length > 0);
    var hasSaved   = !!(it.foto_urls && it.foto_urls.length > 0);
    // Juga cek findingMap (foto yang sudah tersimpan di server dari sesi sebelumnya)
    var srvFoto = (window._auditRenderCtx && window._auditRenderCtx.findingMap && it.result_id)
      ? window._auditRenderCtx.findingMap[it.result_id]
      : null;
    var hasSrvFoto = !!(srvFoto && srvFoto.foto_urls);

    if (!hasPending && !hasSaved && !hasSrvFoto) return true;  // tidak ada foto sama sekali
    return false;
  });

  if (missing.length) {
    var missingNos = missing.map(function(m) { return m.check_item_no; }).join(', ');
    var hasNoDesc  = missing.some(function(m) { return !m.deskripsi_temuan; });
    var hasNoFoto  = missing.some(function(m) { return !!m.deskripsi_temuan; });
    var msg = hasNoDesc
      ? 'Item Non Comply #' + missingNos + ' belum diisi deskripsi temuan.'
      : 'Item Non Comply #' + missingNos + ' belum ada foto bukti.';
    return toast(msg, 'error', 6000);
  }
  // Nomor persyaratan to send to server (use first item's nomor)
  // BUG 3 FIX: ambil dari data item langsung, bukan parse dari string key
  // nomor_persyaratan sudah dijamin ada di setiap item karena _draftSetItem selalu menyimpannya
  var nomorPersyaratan = Number(items[0].nomor_persyaratan);
  if (!nomorPersyaratan) {
    // Fallback aman: cari dari items lain di draft yang punya nomor valid
    for (var fi = 0; fi < items.length; fi++) {
      if (Number(items[fi].nomor_persyaratan)) {
        nomorPersyaratan = Number(items[fi].nomor_persyaratan);
        break;
      }
    }
  }
  if (!nomorPersyaratan) return toast('Nomor persyaratan tidak ditemukan di draft. Coba refresh halaman.', 'error');

  var restore = btnLoading(btn, 'Menyimpan...');
  try {
    var pending = window._auditPendingFiles || {};
    for (var i = 0; i < items.length; i++) {
      var it   = items[i];
      var dKey = _draftItemKey(gKey, it.result_id);
      if (pending[dKey] && pending[dKey].length) { it.files = await filesToBase64(pending[dKey]); }
    }

    var agendas = await cachedApi('GET_AGENDAS_BY_PERIOD', { period_id: periodId }, 30);
    var agenda  = agendas.find(function(a) { return a.agenda_id === agendaId; });
    if (!agenda) throw new Error('Agenda tidak ditemukan.');

    var result = await api('SAVE_REQUIREMENT_BATCH', {
      period_id:         periodId,
      agenda_id:         agendaId,
      area_id:           agenda.area_id,
      nomor_persyaratan: nomorPersyaratan,
      items:             items,
    });

    if (result.success) {
      toast('Persyaratan tersimpan (' + result.saved.length + ' item).', 'success');
    } else if (result.saved.length > 0) {
      var reasons = (result.skipped || []).map(function(s) { return '#' + s.check_item_no + ': ' + (s.reason || 'unknown'); }).join(' | ');
      console.error('[SAVE_REQUIREMENT_BATCH] skipped:', result.skipped);
      toast(result.saved.length + ' item tersimpan, ' + result.skipped.length + ' gagal — ' + reasons, 'warning', 12000);
    } else {
      var reasonsAll = (result.skipped || []).map(function(s) { return '#' + s.check_item_no + ': ' + (s.reason || 'unknown'); }).join(' | ');
      console.error('[SAVE_REQUIREMENT_BATCH] all skipped:', result.skipped, 'items sent:', items);
      toast('Gagal: ' + (reasonsAll || 'unknown error'), 'error', 12000);
      restore(); return;
    }

    // 1. Update resultMap + findingMap pakai `items` (bukan result.saved — tidak punya nomor_persyaratan)
    if (window._auditRenderCtx) {
      items.forEach(function(it) {
        if (!it.result_id) return;
        window._auditRenderCtx.resultMap[it.result_id] = it.status;
        if (it.status === 'Comply') {
          if (window._auditRenderCtx.findingMap) delete window._auditRenderCtx.findingMap[it.result_id];
        } else if (it.status === 'Non Comply') {
          if (!window._auditRenderCtx.findingMap) window._auditRenderCtx.findingMap = {};
          window._auditRenderCtx.findingMap[it.result_id] = {
            result_id:        it.result_id,
            deskripsi_temuan: it.deskripsi_temuan || '',
            foto_urls:        it.existing_foto_urls || '',
          };
        }
      });
    }

    // 2. Clean up draft — hapus dari memory DAN localStorage
    Object.keys(pending).forEach(function(k) { if (k.indexOf(prefix) === 0) delete pending[k]; });
    Object.keys(draft.items).forEach(function(k) { if (k.indexOf(prefix) === 0) delete draft.items[k]; });
    draft.activeGroupKey = null;
    // Hapus dari localStorage secara eksplisit — jangan cuma persist state kosong
    try { localStorage.removeItem(_draftKey(agendaId)); } catch(e) {}
    delete window._auditLockState[gKey];

    clearCache('GET_AUDIT_RESULTS'); clearCache('GET_FINDINGS_BY_AGENDA'); clearCache('GET_LOCKS');

    // 3. Repaint setelah resultMap sudah benar
    items.forEach(function(it) { _repaintCheckItemRow(gKey, it.result_id, it.status, false); });
    _renderFloatingSaveBar(agendaId, periodId);

    var groupEl = document.querySelector('[data-req-group="' + escAttr(gKey) + '"]');
    if (groupEl) groupEl.style.boxShadow = '';
    var editingEl = groupEl && groupEl.querySelector('.ci-editing-indicator');
    if (editingEl) editingEl.innerHTML = '';

    setTimeout(function() {
      var el = document.querySelector('[data-req-group="' + escAttr(gKey) + '"]');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);

  } catch(err) { toast(err.message, 'error'); restore(); }
}

// ============================================================
//  _confirmDiscardDraft
// ============================================================

async function _confirmDiscardDraft(agendaId, periodId) {
  var draft = window._auditDraft;
  if (!draft || draft.activeGroupKey === null) return;

  var ok = await showConfirm({
    title: 'Buang Draf', message: 'Buang semua isian yang belum disimpan?',
    detail: 'Lock akan dilepas dan auditor lain bisa mengambil persyaratan ini.',
    confirmText: 'Buang',
  });
  if (!ok) return;

  var gKey   = draft.activeGroupKey;
  var prefix = gKey + ':';
  var nomor  = _nomorFromGroupKey(gKey);

  try { if (nomor) await api('RELEASE_LOCK', { period_id: periodId, agenda_id: agendaId, nomor_persyaratan: nomor }); }
  catch(err) { console.warn('Release lock gagal:', err.message); }

  if (window._auditPendingFiles) Object.keys(window._auditPendingFiles).forEach(function(k) { if (k.indexOf(prefix) === 0) delete window._auditPendingFiles[k]; });
  Object.keys(draft.items).forEach(function(k) { if (k.indexOf(prefix) === 0) delete draft.items[k]; });
  draft.activeGroupKey = null;
  _persistAuditDraft();
  delete window._auditLockState[gKey];

  clearCache('GET_LOCKS');
  toast('Draf dibuang.', 'info');

  _repaintGroupItems(gKey);
  _renderFloatingSaveBar(agendaId, periodId);

  var groupEl = document.querySelector('[data-req-group="' + escAttr(gKey) + '"]');
  if (groupEl) groupEl.style.boxShadow = '';
  var editingEl = groupEl && groupEl.querySelector('.ci-editing-indicator');
  if (editingEl) editingEl.innerHTML = '';
}

// ============================================================
//  Finish audit + agreement modal
// ============================================================

function finishAudit(agendaId, periodId) { _openAgreementModal(agendaId, periodId); }

function _openAgreementModal(agendaId, periodId) {
  createModal({
    id: 'agreement-modal', title: 'Upload Bukti Agreement', size: 'modal-lg',
    body:
      '<p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">Upload foto bersama auditor dan auditee sebagai bukti bahwa hasil audit telah dikomunikasikan dan disepakati.</p>' +
      '<div id="agr-findings-preview" style="margin-bottom:16px"></div>' +
      '<div class="form-group"><label class="form-label">Nama Auditee yang Hadir <span class="required">*</span></label>' +
        '<div class="form-hint" style="margin-bottom:8px">Tulis nama auditee yang hadir. Pisahkan dengan koma.</div>' +
        '<textarea class="form-control" id="agr-auditee-names" rows="2" placeholder="Budi Santoso, Siti Aminah"></textarea></div>' +
      '<div class="form-group"><label class="form-label">Foto Agreement <span class="required">*</span></label>' +
        '<div class="upload-zone" id="agr-upload-zone" style="min-height:100px">' +
          '<i data-lucide="camera" style="width:28px;height:28px;opacity:.3;margin-bottom:8px"></i>' +
          '<div class="upload-text">Klik atau ambil foto bersama auditee</div>' +
          '<div class="text-xs text-muted" style="margin-top:4px">JPG, PNG</div></div>' +
        '<div class="upload-previews" id="agr-upload-preview"></div></div>',
    footer:
      '<button class="btn btn-outline" onclick="closeModal(\'agreement-modal\')">Batal</button>' +
      '<button class="btn btn-primary" id="agr-submit-btn" onclick="singleClick(this,function(){ _submitAgreementAndFinish(\'' + agendaId + '\',\'' + periodId + '\') })">' +
        '<i data-lucide="check-circle" style="width:14px;height:14px"></i>Selesaikan & Submit Agreement</button>',
  });
  lucide.createIcons();
  setupUploadZone('agr-upload-zone', 'agr-upload-preview');
  var period = App.activePeriod;
  if (period) {
    cachedApi('GET_FINDINGS_BY_AGENDA', { period_id: period.period_id, agenda_id: agendaId }, 10).then(function(findings) {
      var el = document.getElementById('agr-findings-preview');
      if (!el) return;
      if (!findings.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px 0">Tidak ada temuan di agenda ini.</div>'; return; }
      el.innerHTML = '<div style="font-size:12px;font-weight:600;margin-bottom:8px">Ringkasan Temuan (' + findings.length + '):</div>' +
        findings.map(function(f) {
          return '<div style="margin-bottom:8px;padding:8px 10px;background:var(--bg);border-radius:6px;' +
            'border-left:3px solid var(--rose,#f43f5e)">' +
            '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">' +
              '<span class="badge badge-rose" style="font-size:10px">Non Comply</span>' +
              '<span style="font-size:11px;font-weight:600;color:var(--text-muted)">' +
                '#' + f.nomor_persyaratan + '.' + f.check_item_no +
              '</span>' +
            '</div>' +
            (f.deskripsi_temuan
              ? '<div style="font-size:12px;color:var(--text-muted);line-height:1.4">' +
                  escHtml(f.deskripsi_temuan) +
                '</div>'
              : '') +
          '</div>';
        }).join('');
      lucide.createIcons();
    }).catch(function() {});
  }
}

async function _submitAgreementAndFinish(agendaId, periodId) {
  var zone  = document.getElementById('agr-upload-zone');
  var files = zone && zone._getFiles ? zone._getFiles() : [];
  if (!files.length) return toast('Upload foto agreement terlebih dahulu.', 'error');
  var auditeeNames = (document.getElementById('agr-auditee-names') || {}).value?.trim();
  if (!auditeeNames) return toast('Isi nama auditee yang hadir terlebih dahulu.', 'error');
  var btn = document.getElementById('agr-submit-btn');
  var restore = btnLoading(btn, 'Memproses...');
  try {
    var b64 = await filesToBase64([files[0]]);
    var fileUp = b64[0];
    await api('FINISH_AUDIT',     { agenda_id: agendaId, period_id: periodId });
    await api('SUBMIT_AGREEMENT', { period_id: periodId, agenda_id: agendaId, file_base64: fileUp.base64, file_name: fileUp.name, mime_type: fileUp.mime_type, auditee_hadir_names: auditeeNames });
    clearCache('GET_FINDINGS_BY_AGENDA'); clearCache('GET_ALL_FINDINGS_BY_PERIOD'); clearCache('GET_AGENDAS_BY_PERIOD'); clearCache('GET_DASHBOARD');
    _stopLockPolling();
    toast('Audit selesai. Agreement berhasil disubmit.', 'success');
    closeModal('agreement-modal');
    if (window._auditActiveAreaId) selectAuditArea(window._auditActiveAreaId, periodId);
    else _backToAuditAreas();
  } catch(err) { toast(err.message, 'error'); restore(); }
}

// ============================================================
//  Helpers
// ============================================================

function _emailInCsv(csv, email) {
  if (!csv || !email) return false;
  var target = String(email).trim().toLowerCase();
  return String(csv).split(',').map(function(e) { return e.trim().toLowerCase(); }).indexOf(target) !== -1;
}
